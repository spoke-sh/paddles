<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paddles</title>
<style>
:root {
  --bg: #c6d0d8;
  --bg-deep: #6f8392;
  --surface: rgba(239, 243, 246, 0.82);
  --surface-strong: rgba(251, 252, 253, 0.97);
  --surface-soft: rgba(219, 227, 233, 0.82);
  --border: rgba(69, 84, 97, 0.24);
  --border-strong: rgba(48, 62, 74, 0.46);
  --text: #0f1820;
  --muted: #556472;
  --accent: #2d90c8;
  --accent-soft: #8ccae6;
  --nav: #2d90c8;
  --action: #f08a24;
  --evidence: #17956c;
  --branch: #dfb23f;
  --merge: #d65f4a;
  --thread: #70808d;
  --green: #17956c;
  --orange: #f08a24;
  --red: #d65f4a;
  --purple: #5376a3;
  --pink: #d16a66;
  --shadow-raised:
    -10px -10px 24px rgba(255, 255, 255, 0.62),
    16px 20px 38px rgba(62, 79, 94, 0.22);
  --shadow-inset:
    inset 1px 1px 0 rgba(255, 255, 255, 0.82),
    inset -1px -1px 0 rgba(111, 127, 141, 0.14);
  --glass-highlight: linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.1));
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html,
body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: "SF Pro Display", "SF Pro Text", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 20%),
    radial-gradient(circle at 84% 16%, rgba(45, 144, 200, 0.26), transparent 16%),
    radial-gradient(circle at 76% 76%, rgba(240, 138, 36, 0.16), transparent 18%),
    linear-gradient(160deg, #dde4ea 0%, #bac6cf 42%, #90a1af 100%);
  color: var(--text);
  height: 100dvh;
  display: flex;
  gap: 18px;
  padding: 18px;
  letter-spacing: 0.01em;
  overflow: hidden;
}

.chat-panel,
.trace-panel {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 26px;
  backdrop-filter: blur(24px) saturate(145%);
  -webkit-backdrop-filter: blur(24px) saturate(145%);
  box-shadow: var(--shadow-raised), var(--shadow-inset);
  overflow: hidden;
  min-height: 0;
}

.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.08)),
    linear-gradient(155deg, rgba(237, 242, 246, 0.94), rgba(206, 216, 225, 0.88));
}
.trace-panel {
  width: min(48vw, 720px);
  min-width: 420px;
  display: flex;
  flex-direction: column;
  padding: 18px;
  min-height: 0;
  background:
    radial-gradient(circle at top right, rgba(45, 144, 200, 0.24), transparent 34%),
    radial-gradient(circle at 18% 84%, rgba(240, 138, 36, 0.14), transparent 22%),
    linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(214, 223, 230, 0.92));
}

.chat-header {
  padding: 18px 22px;
  border-bottom: 1px solid rgba(122, 142, 157, 0.2);
  font-weight: 700;
  font-size: 12px;
  color: #4d5f6c;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.06));
}
.chat-messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.msg {
  max-width: 85%;
  padding: 14px 16px;
  border-radius: 22px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid rgba(255,255,255,0.46);
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.75),
    0 10px 20px rgba(90, 104, 120, 0.14);
}
.msg.user {
  align-self: flex-end;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02)),
    linear-gradient(140deg, #49a5d9, #2d90c8);
  color: #f8fbfd;
  border-bottom-right-radius: 8px;
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.26),
    0 12px 24px rgba(46, 125, 178, 0.26);
}
.msg.assistant {
  align-self: flex-start;
  background:
    var(--glass-highlight),
    linear-gradient(155deg, rgba(245, 248, 250, 0.94), rgba(220, 228, 235, 0.88));
  border-bottom-left-radius: 8px;
}
.msg.system {
  align-self: center;
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  background: rgba(255,255,255,0.3);
}

.events-group { align-self: flex-start; width: 100%; }
.event-row {
  font-size: 12px;
  color: var(--muted);
  padding: 5px 8px;
  display: flex;
  gap: 8px;
  align-items: baseline;
  border-radius: 14px;
  background: rgba(248,251,252,0.38);
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.62),
    0 4px 10px rgba(98, 113, 128, 0.08);
}
.event-badge {
  font-family: ui-monospace, "SFMono-Regular", "SF Mono", "IBM Plex Mono", monospace;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 999px;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.42);
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.52);
}
.event-badge.planner { background: rgba(45, 144, 200, 0.18); color: #255f86; }
.event-badge.tool { background: rgba(240, 138, 36, 0.22); color: #9e561d; }
.event-badge.tool-diff { background: rgba(23, 149, 108, 0.22); color: #166751; }
.event-badge.gatherer { background: rgba(223, 178, 63, 0.2); color: #82620f; }
.event-badge.route { background: rgba(45, 144, 200, 0.18); color: #255f86; }
.event-badge.synthesis { background: rgba(23, 149, 108, 0.16); color: #166751; }
.event-badge.fallback { background: rgba(214, 95, 74, 0.18); color: #9a4536; }
.diff-lines { display: block; margin-top: 4px; padding-left: 12px; }
.diff-line { white-space: pre; display: block; }
.diff-line.add { color: #3fb950; }
.diff-line.remove { color: #f85149; }
.diff-line.context { color: var(--text); }
.diff-line.meta { color: #8b949e; }
.diff-line.hunk { color: var(--accent); }
.diff-line.noop { color: var(--muted); }

.chat-input {
  padding: 18px;
  border-top: 1px solid rgba(122, 142, 157, 0.2);
  display: flex;
  gap: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.46));
}
.chat-input input {
  flex: 1;
  background:
    linear-gradient(180deg, rgba(247,249,251,0.98), rgba(223, 231, 238, 0.96));
  border: 1px solid rgba(97, 114, 129, 0.28);
  border-radius: 18px;
  padding: 14px 18px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  box-shadow:
    inset 2px 2px 5px rgba(255,255,255,0.9),
    inset -3px -3px 8px rgba(135, 151, 166, 0.24);
}
.chat-input input:focus {
  border-color: rgba(46, 125, 178, 0.54);
  box-shadow:
    inset 2px 2px 5px rgba(255,255,255,0.9),
    inset -3px -3px 8px rgba(181, 194, 205, 0.28),
    0 0 0 4px rgba(92, 169, 212, 0.2);
}
.chat-input button {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02)),
    linear-gradient(140deg, #3f97ce, #2e7db2);
  color: #f7fbfd;
  border: 1px solid rgba(255,255,255,0.36);
  border-radius: 18px;
  padding: 12px 22px;
  font-weight: 700;
  cursor: pointer;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.45),
    0 10px 20px rgba(46, 125, 178, 0.3);
}
.chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

.trace-header-wrap {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 16px;
  padding: 4px 6px 10px;
}
.trace-header {
  font-size: 12px;
  font-weight: 700;
  color: #495b68;
  text-transform: uppercase;
  letter-spacing: 0.24em;
}
.trace-subhead {
  font-family: ui-monospace, "SFMono-Regular", "SF Mono", "IBM Plex Mono", monospace;
  font-size: 11px;
  color: #61717e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.trace-board {
  --tile-size: clamp(112px, 12vw, 148px);
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding: 10px 10px 22px 6px;
  position: relative;
  border-radius: 24px;
  background:
    radial-gradient(circle at top right, rgba(45, 144, 200, 0.12), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0.02)),
    linear-gradient(180deg, rgba(189, 201, 211, 0.88), rgba(157, 171, 183, 0.94));
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.7),
    inset -2px -2px 0 rgba(98, 117, 132, 0.08),
    inset 0 24px 38px rgba(255,255,255,0.06);
}
.trace-canvas {
  position: relative;
  min-width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 6px;
}
.trace-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
  z-index: 0;
}
.trace-overlay__glow {
  fill: none;
  stroke: rgba(45, 144, 200, 0.22);
  stroke-width: 16;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.trace-overlay__trench {
  fill: none;
  stroke: rgba(58, 72, 84, 0.22);
  stroke-width: 20;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.trace-overlay__line {
  fill: none;
  stroke: rgba(36, 118, 168, 0.95);
  stroke-width: 4.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 11 11;
}
.trace-row {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 14px;
  justify-content: flex-start;
  overflow: visible;
}
.trace-row.reverse { flex-direction: row-reverse; }
.trace-node {
  position: relative;
  z-index: 1;
  width: var(--tile-size);
  min-width: var(--tile-size);
  aspect-ratio: 1 / 1;
  overflow: visible;
  --node-raise: -3px;
  --node-shadow-x: 10px;
  --node-shadow-y: 13px;
  --node-shadow-blur: 20px;
  --node-shadow-alpha: 0.18;
  --node-shadow-color: 70, 84, 98;
  --node-shadow-warm-alpha: 0;
  --node-shadow-warm-x: 0px;
  --node-shadow-warm-y: 0px;
  --node-shadow-warm-blur: 0px;
  --node-specular-alpha: 0.74;
  --node-thickness: 7px;
  --node-tilt-x: 5deg;
  --node-tilt-y: -3deg;
}
.trace-node:hover,
.trace-node:focus-within {
  z-index: 30;
}
.trace-node::before {
  content: "";
  position: absolute;
  left: 16%;
  right: 12%;
  bottom: 12%;
  height: 18%;
  border-radius: 999px;
  background: radial-gradient(
    ellipse at center,
    rgba(195, 134, 78, var(--node-shadow-warm-alpha)) 0%,
    rgba(195, 134, 78, calc(var(--node-shadow-warm-alpha) * 0.55)) 18%,
    rgba(var(--node-shadow-color), calc(var(--node-shadow-alpha) + 0.06)) 0%,
    rgba(var(--node-shadow-color), calc(var(--node-shadow-alpha) * 0.42)) 45%,
    rgba(var(--node-shadow-color), 0) 80%
  );
  transform: translate(calc(var(--node-shadow-x) * 0.58), calc(var(--node-shadow-y) * 0.62 + 2px)) scaleX(0.92);
  filter:
    drop-shadow(var(--node-shadow-warm-x) var(--node-shadow-warm-y) var(--node-shadow-warm-blur) rgba(195, 134, 78, calc(var(--node-shadow-warm-alpha) * 0.72)))
    blur(calc(var(--node-shadow-blur) * 0.6));
  opacity: 0.94;
  pointer-events: none;
  z-index: 0;
  transition: transform 180ms ease, filter 180ms ease, opacity 180ms ease;
}
.trace-node::after {
  content: "";
  position: absolute;
  inset: 4% 5% 1% 5%;
  clip-path: polygon(24% 6%, 76% 6%, 100% 50%, 76% 94%, 24% 94%, 0% 50%);
  background:
    linear-gradient(150deg,
      color-mix(in srgb, var(--node-color) 34%, rgba(22, 29, 36, 0.94)),
      color-mix(in srgb, var(--node-color) 58%, rgba(36, 46, 56, 0.92)) 58%,
      rgba(31, 40, 48, 0.92)
    );
  transform: perspective(320px) rotateX(var(--node-tilt-x)) rotateY(var(--node-tilt-y)) translate(calc(var(--node-shadow-x) * 0.12), calc(var(--node-thickness) + var(--node-shadow-y) * 0.06));
  opacity: 0.96;
  z-index: 1;
  pointer-events: none;
  transition: transform 180ms ease, opacity 180ms ease;
}
.trace-node__hex {
  position: relative;
  width: 100%;
  height: 100%;
  clip-path: polygon(24% 6%, 76% 6%, 100% 50%, 76% 94%, 24% 94%, 0% 50%);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0) 32%),
    linear-gradient(150deg, rgba(255,255,255,var(--node-specular-alpha)), rgba(255,255,255,0.12) 38%, rgba(255,255,255,0.02) 100%),
    linear-gradient(180deg,
      color-mix(in srgb, var(--node-color) 7%, rgba(253, 253, 252, 0.98)),
      color-mix(in srgb, var(--node-color) 22%, rgba(232, 238, 242, 0.97)) 64%,
      color-mix(in srgb, var(--node-color) 30%, rgba(210, 218, 224, 0.97))
    );
  border: 1px solid color-mix(in srgb, var(--node-color) 46%, rgba(70, 84, 98, 0.28));
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.82),
    inset -4px -5px 12px rgba(105, 119, 131, 0.12),
    inset 0 -14px 18px rgba(77, 92, 104, 0.08),
    -8px -8px 18px rgba(255,255,255,0.56),
    var(--node-shadow-x) var(--node-shadow-y) var(--node-shadow-blur) rgba(var(--node-shadow-color), var(--node-shadow-alpha));
  padding: 14px 16px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
  text-align: center;
  transform: perspective(320px) rotateX(var(--node-tilt-x)) rotateY(var(--node-tilt-y)) translateY(var(--node-raise));
  z-index: 2;
}
.trace-node:hover .trace-node__hex {
  transform: perspective(320px) rotateX(calc(var(--node-tilt-x) + 1deg)) rotateY(var(--node-tilt-y)) translateY(calc(var(--node-raise) - 6px)) scale(1.02);
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.9),
    inset -3px -4px 12px rgba(152, 169, 184, 0.14),
    -10px -10px 20px rgba(255,255,255,0.78),
    calc(var(--node-shadow-x) + 4px) calc(var(--node-shadow-y) + 6px) calc(var(--node-shadow-blur) + 8px) rgba(var(--node-shadow-color), calc(var(--node-shadow-alpha) + 0.08));
  border-color: var(--node-color);
}
.trace-node:hover::after {
  transform: perspective(320px) rotateX(calc(var(--node-tilt-x) + 1deg)) rotateY(var(--node-tilt-y)) translate(calc(var(--node-shadow-x) * 0.16 + 1px), calc(var(--node-thickness) + var(--node-shadow-y) * 0.08 + 2px));
}
.trace-node:hover::before {
  transform: translate(calc(var(--node-shadow-x) * 0.66), calc(var(--node-shadow-y) * 0.72 + 4px)) scaleX(0.98);
  filter: blur(calc(var(--node-shadow-blur) * 0.66));
  opacity: 1;
}
.trace-node--latest::before {
  animation: traceShadowPulse 3.2s ease-in-out infinite;
}
@keyframes traceShadowPulse {
  0%, 100% {
    opacity: 0.84;
    filter: blur(calc(var(--node-shadow-blur) * 0.5));
  }
  50% {
    opacity: 1;
    filter: blur(calc(var(--node-shadow-blur) * 0.62));
  }
}
.trace-node__sequence {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: color-mix(in srgb, var(--node-color) 76%, white);
  opacity: 0.82;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}
.trace-node__kind {
  position: absolute;
  top: 31px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #5a6876;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
  max-width: calc(100% - 32px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.trace-node__label {
  font-size: 14px;
  line-height: 1.2;
  font-weight: 700;
  color: var(--text);
  width: 100%;
  max-width: calc(100% - 10px);
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 5;
  overflow: hidden;
  text-overflow: ellipsis;
  word-break: break-word;
  text-align: center;
}
.trace-node__branch {
  position: absolute;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  font-size: 10px;
  color: #4e5b67;
  width: calc(100% - 32px);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.trace-node__detail {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translate(-50%, calc(-100% - 10px)) scale(0.96);
  width: clamp(180px, 18vw, 280px);
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--node-color) 28%, rgba(148, 164, 177, 0.4));
  background:
    linear-gradient(180deg, rgba(255,255,255,0.72), rgba(243,247,250,0.28)),
    rgba(235, 241, 245, 0.94);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow:
    -8px -8px 22px rgba(255,255,255,0.7),
    14px 20px 38px rgba(125, 143, 159, 0.28);
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 160ms ease, transform 160ms ease;
}
.trace-node:hover .trace-node__detail {
  opacity: 1;
  transform: translate(-50%, calc(-100% - 14px)) scale(1);
}
.trace-node[data-detail-y="below"] .trace-node__detail {
  top: 100%;
  transform: translate(-50%, 10px) scale(0.96);
}
.trace-node[data-detail-y="below"]:hover .trace-node__detail {
  transform: translate(-50%, 14px) scale(1);
}
.trace-node[data-detail-x="left"] .trace-node__detail {
  left: auto;
  right: 0;
}
.trace-node[data-detail-x="left"]:not([data-detail-y="below"]) .trace-node__detail {
  transform: translate(0, calc(-100% - 10px)) scale(0.96);
}
.trace-node[data-detail-x="left"]:not([data-detail-y="below"]):hover .trace-node__detail {
  transform: translate(0, calc(-100% - 14px)) scale(1);
}
.trace-node[data-detail-x="left"][data-detail-y="below"] .trace-node__detail {
  transform: translate(0, 10px) scale(0.96);
}
.trace-node[data-detail-x="left"][data-detail-y="below"]:hover .trace-node__detail {
  transform: translate(0, 14px) scale(1);
}
.trace-node[data-detail-x="right"] .trace-node__detail {
  left: 0;
  transform: translate(0, calc(-100% - 10px)) scale(0.96);
}
.trace-node[data-detail-x="right"]:hover .trace-node__detail {
  transform: translate(0, calc(-100% - 14px)) scale(1);
}
.trace-node[data-detail-x="right"][data-detail-y="below"] .trace-node__detail {
  transform: translate(0, 10px) scale(0.96);
}
.trace-node[data-detail-x="right"][data-detail-y="below"]:hover .trace-node__detail {
  transform: translate(0, 14px) scale(1);
}
.trace-node__detail-title {
  font-size: 16px;
  line-height: 1.25;
  font-weight: 700;
  word-break: break-word;
}
.trace-node__detail-meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.45;
}
.trace-empty { color: var(--muted); font-size: 12px; font-style: italic; }

@media (max-width: 960px) {
  body { flex-direction: column; height: 100dvh; padding: 14px; }
  .chat-panel { flex: 1 1 48vh; min-height: 0; }
  .trace-panel { width: 100%; min-width: 0; flex: 1 1 42vh; min-height: 0; }
}
</style>
</head>
<body>

<div class="chat-panel">
  <div class="chat-header">Paddles</div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="prompt" placeholder="Ask paddles..." autofocus>
    <button id="send" onclick="sendTurn()">Send</button>
  </div>
</div>

<div class="trace-panel">
  <div class="trace-header-wrap">
    <div class="trace-header">Transit Trace</div>
    <div class="trace-subhead">Turn Steps</div>
  </div>
  <div id="trace-board" class="trace-board"></div>
  <div class="trace-empty" id="trace-empty">Submit a prompt to see the trace railroad.</div>
</div>

<script>
let sessionId = null;
let eventSource = null;
let transcriptEventSource = null;
let transcriptSignature = '';
const MUTATION_TOOLS = new Set(["diff", "apply_patch"]);

const KIND_COLORS = {
  root: '#2d90c8',
  turn: '#2d90c8',
  action: '#f08a24',
  branch: '#dfb23f',
  tool: '#f08a24',
  tool_done: '#d27820',
  evidence: '#17956c',
  checkpoint: '#17956c',
  merge: '#d65f4a',
  thread: '#70808d'
};

const TRACE_TILE_MIN = 128;
const TRACE_TILE_GAP = 14;
let latestTraceGraph = null;

async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
}

function connectSSE() {
  if (eventSource) eventSource.close();
  if (transcriptEventSource) transcriptEventSource.close();
  eventSource = new EventSource('/events');
  eventSource.addEventListener('turn_event', (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  });
  transcriptEventSource = new EventSource('/sessions/' + sessionId + '/transcript/events');
  transcriptEventSource.addEventListener('transcript_update', async () => {
    await refreshConversationTranscript({ reset: true, only_if_changed: true });
  });
}

function addMessage(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  const messages = document.getElementById('messages');
  const group = messages.querySelector('.events-group');
  if (group) {
    messages.insertBefore(el, group);
  } else {
    messages.appendChild(el);
  }
  el.scrollIntoView({ behavior: 'smooth' });
}

function clearTranscriptMessages() {
  const messages = document.getElementById('messages');
  for (const node of Array.from(messages.querySelectorAll('.msg'))) {
    node.remove();
  }
}

function transcriptSignatureForConversation(transcript) {
  const last = transcript.entries.length ? transcript.entries[transcript.entries.length - 1] : null;
  const lastId = last ? last.record_id : 'none';
  return transcript.task_id + ':' + transcript.entries.length + ':' + lastId;
}

function eventGroup() {
  let group = document.getElementById('messages').lastElementChild;
  if (!group || !group.classList.contains('events-group')) {
    group = document.createElement('div');
    group.className = 'events-group';
    document.getElementById('messages').appendChild(group);
  }
  return group;
}

function addEventRow(badge, badgeCls, text, htmlContent = null, options = {}) {
  const { key = null, replace = false } = options;
  const group = eventGroup();
  if (key) {
    const existing = group.querySelector('[data-event-key="' + key + '"]');
    if (existing) {
      const content = htmlContent === null ? escapeHtml(text) : htmlContent;
      existing.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + content + '</span>';
      existing.dataset.eventText = text;
      existing.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }
  }
  if (replace && group.lastElementChild && group.lastElementChild.classList.contains('event-row')) {
    group.lastElementChild.remove();
  }
  const row = document.createElement('div');
  row.className = 'event-row';
  const content = htmlContent === null ? escapeHtml(text) : htmlContent;
  row.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + content + '</span>';
  if (key) {
    row.dataset.eventKey = key;
  }
  row.dataset.eventText = text;
  group.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDuration(totalSeconds) {
  const seconds = Number(totalSeconds);
  if (!Number.isFinite(seconds) || seconds <= 0) {
    return '0s';
  }
  const s = Math.floor(seconds % 60);
  const m = Math.floor((seconds / 60) % 60);
  const h = Math.floor(seconds / 3600);
  if (h > 0) {
    return `${h}h ${m}m ${s}s`;
  }
  if (m > 0) {
    return `${m}m ${s}s`;
  }
  return `${s}s`;
}

function isMutationTool(toolName) {
  return MUTATION_TOOLS.has(toolName);
}

function extractMutationDiff(toolName, summary) {
  if (!summary) {
    return null;
  }
  if (toolName === "diff") {
    if (summary === "No diff output.") {
      return summary;
    }
    if (summary.startsWith("Diff output:\n")) {
      return summary.slice("Diff output:\n".length);
    }
    if (summary.startsWith("Diff output:\r\n")) {
      return summary.slice("Diff output:\r\n".length);
    }
    return null;
  }
  if (toolName === "apply_patch") {
    if (!summary.startsWith("Applied patch:\n")) {
      return null;
    }
    const body = summary.slice("Applied patch:\n".length);
    return body
      .split("\n\nExit status:")[0]
      .split("\nExit status:")[0]
      .trim();
  }
  return null;
}

function diffLineClass(line) {
  if (
    line.startsWith("+++") ||
    line.startsWith("---") ||
    line.startsWith("diff ") ||
    line.startsWith("index ")
  ) {
    return "meta";
  }
  if (line.startsWith("+")) {
    return "add";
  }
  if (line.startsWith("-")) {
    return "remove";
  }
  if (line.startsWith("@@")) {
    return "hunk";
  }
  if (line.startsWith("\\")) {
    return "noop";
  }
  return "context";
}

function formatDiffForEvent(toolName, diff) {
  const lines = diff
    .split("\n")
    .map(
      (line) =>
        '<span class="diff-line ' +
        diffLineClass(line) +
        '">' +
        escapeHtml(line) +
        "</span>"
    )
    .join("<br>");
  return (
    escapeHtml(toolName + " done") +
    "<br>" +
    "<span class=\"diff-lines\">" +
    lines +
    "</span>"
  );
}

function handleEvent(ev) {
  const t = ev.type;
  if (t === 'intent_classified') {
    addEventRow('route', 'route', 'Intent: ' + ev.intent);
  } else if (t === 'interpretation_context') {
    addEventRow('context', 'route', ev.summary);
  } else if (t === 'planner_action_selected') {
    addEventRow('planner', 'planner', 'Step ' + ev.sequence + ': ' + ev.action);
  } else if (t === 'tool_called') {
    addEventRow('tool', 'tool', ev.tool_name + ': ' + truncate(ev.invocation, 60));
  } else if (t === 'tool_finished') {
    if (isMutationTool(ev.tool_name)) {
      const diff = extractMutationDiff(ev.tool_name, ev.summary);
      if (diff) {
        addEventRow(
          'tool',
          'tool-diff',
          ev.tool_name + ' done',
          formatDiffForEvent(ev.tool_name, diff)
        );
      } else {
        addEventRow('tool', 'tool', ev.tool_name + ' done');
      }
    } else {
      addEventRow('tool', 'tool', ev.tool_name + ' done');
    }
  } else if (t === 'gatherer_summary') {
    addEventRow('gather', 'gatherer', ev.summary);
  } else if (t === 'gatherer_search_progress') {
    const eta = ev.eta_seconds == null ? 'unknown' : formatDuration(ev.eta_seconds);
    const strategy = ev.strategy ? ' strategy=' + ev.strategy : '';
    const details = ev.detail ? ' · ' + ev.detail : '';
    const progressText = 'searching (' + ev.phase + ')' + strategy + ' · eta ' + eta + details;
    addEventRow('gather', 'gatherer', progressText, null, { key: 'gather-progress' });
  } else if (t === 'planner_summary') {
    addEventRow('planner', 'planner', ev.strategy + ' ' + ev.mode + ' (' + ev.steps + ' steps)');
  } else if (t === 'synthesis_ready') {
    if (ev.insufficient_evidence) {
      addEventRow('synth', 'fallback', 'Insufficient evidence');
    } else {
      addEventRow('synth', 'synthesis', ev.grounded ? 'Grounded' : 'Direct');
    }
  } else if (t === 'route_selected') {
    addEventRow('route', 'route', truncate(ev.summary, 80));
  } else if (t === 'fallback') {
    addEventRow('fallback', 'fallback', ev.stage + ': ' + ev.reason);
  } else if (t === 'planner_capability' || t === 'gatherer_capability') {
    addEventRow('cap', 'route', ev.provider + ': ' + ev.capability);
  } else if (t === 'thread_merged') {
    addEventRow('merge', 'planner', ev.source_thread + ' -> ' + ev.target_thread);
  }
  refreshTraceGraph();
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

async function sendTurn() {
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send');
  const text = input.value.trim();
  if (!text) return;
  await ensureSession();

  input.value = '';
  btn.disabled = true;

  try {
    const res = await fetch('/sessions/' + sessionId + '/turns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text }),
    });
    if (!res.ok) {
      throw new Error('Request failed with status ' + res.status);
    }
    await res.json();
    await refreshConversationTranscript({ reset: true, only_if_changed: true });
    refreshTraceGraph();
  } catch (err) {
    addMessage('system', 'Error: ' + err.message);
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTurn(); }
});

/* Trace railroad rendering from real transit trace data */
let graphDebounce = null;
function refreshTraceGraph() {
  if (graphDebounce) return;
  graphDebounce = setTimeout(async () => {
    graphDebounce = null;
    try {
      const res = await fetch('/trace/graph');
      if (!res.ok) return;
      const graph = await res.json();
      renderTraceDAG(graph);
    } catch (e) { /* ignore fetch errors during turn processing */ }
  }, 200);
}

function renderTraceDAG(graph) {
  latestTraceGraph = graph;
  const board = document.getElementById('trace-board');
  const empty = document.getElementById('trace-empty');
  if (!graph.nodes.length) {
    board.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const sorted = [...graph.nodes].sort((a, b) => a.sequence - b.sequence);
  const branchLabels = Object.fromEntries(
    (graph.branches || []).map((branch) => [branch.id, branch.label])
  );
  const columns = Math.max(
    2,
    Math.floor((Math.max(board.clientWidth, 280) + TRACE_TILE_GAP) / (TRACE_TILE_MIN + TRACE_TILE_GAP))
  );
  const rows = [];
  for (let i = 0; i < sorted.length; i += columns) {
    rows.push(sorted.slice(i, i + columns));
  }

  board.innerHTML =
    '<div class="trace-canvas">' +
      '<svg class="trace-overlay" id="trace-overlay" aria-hidden="true">' +
        '<path class="trace-overlay__glow" id="trace-overlay-glow"></path>' +
        '<path class="trace-overlay__trench" id="trace-overlay-trench"></path>' +
        '<path class="trace-overlay__line" id="trace-overlay-line"></path>' +
      '</svg>' +
      rows
        .map((row, rowIndex) => {
          const reverse = rowIndex % 2 === 1 ? ' reverse' : '';
          return '<div class="trace-row' + reverse + '">' +
            row.map((node, nodeIndex) => renderTraceNode(
              node,
              branchLabels,
              sorted.length - (rowIndex * columns + nodeIndex) - 1,
              sorted.length,
              traceNodeDirection(rowIndex, nodeIndex, row.length, rows.length)
            )).join('') +
          '</div>';
        })
        .join('') +
    '</div>';

  bindTraceDetailPlacement(board);
  requestAnimationFrame(() => {
    drawTraceSnake(board);
    updateTraceDetailPlacements(board);
  });
}

function traceNodeDirection(rowIndex, nodeIndex, rowLength, totalRows) {
  const isReverseRow = rowIndex % 2 === 1;
  const isRowTail = nodeIndex === rowLength - 1;
  const hasNextRow = rowIndex < totalRows - 1;
  if (isRowTail && hasNextRow) {
    return 'down';
  }
  return isReverseRow ? 'rtl' : 'ltr';
}

function renderTraceNode(node, branchLabels, recencyIndex, totalNodes, direction) {
  const color = KIND_COLORS[node.kind] || '#8b949e';
  const branchLabel = node.branch_id && branchLabels[node.branch_id]
    ? branchLabels[node.branch_id]
    : null;
  const recencyRatio = totalNodes <= 1 ? 1 : 1 - (recencyIndex / Math.max(totalNodes - 1, 1));
  const depth = Math.max(0, Math.min(1, recencyRatio));
  const sunTrailDepth = Math.max(0, 1 - (recencyIndex / 3));
  const raise = -(2 + depth * 6);
  const shadowX = 5 + depth * 2.5;
  const shadowY = 6 + depth * 4;
  const shadowBlur = 12 + depth * 7;
  const shadowAlpha = 0.1 + depth * 0.12;
  const specularAlpha = 0.68 + depth * 0.2;
  const shadowWarmAlpha = 0.02 + sunTrailDepth * 0.1;
  const shadowWarmX = 1 + sunTrailDepth * 2;
  const shadowWarmY = 2 + sunTrailDepth * 4;
  const shadowWarmBlur = 4 + sunTrailDepth * 10;
  const tiltX = direction === 'down' ? 8 : 5;
  const tiltY = direction === 'ltr' ? -4 : direction === 'rtl' ? 4 : 0;
  const classes = ['trace-node'];
  if (recencyIndex === 0) {
    classes.push('trace-node--latest');
  }
  classes.push('trace-node--' + direction);
  const meta = [
    'kind: ' + escapeHtml(formatTraceKind(node.kind)),
    branchLabel ? 'branch: ' + escapeHtml(branchLabel) : null,
    'record: ' + escapeHtml(node.id)
  ].filter(Boolean).join('<br>');

  return (
    '<div class="' + classes.join(' ') + '" style="' +
      '--node-color:' + color + ';' +
      '--node-raise:' + raise.toFixed(2) + 'px;' +
      '--node-shadow-x:' + shadowX.toFixed(2) + 'px;' +
      '--node-shadow-y:' + shadowY.toFixed(2) + 'px;' +
      '--node-shadow-blur:' + shadowBlur.toFixed(2) + 'px;' +
      '--node-shadow-alpha:' + shadowAlpha.toFixed(3) + ';' +
      '--node-shadow-warm-alpha:' + shadowWarmAlpha.toFixed(3) + ';' +
      '--node-shadow-warm-x:' + shadowWarmX.toFixed(2) + 'px;' +
      '--node-shadow-warm-y:' + shadowWarmY.toFixed(2) + 'px;' +
      '--node-shadow-warm-blur:' + shadowWarmBlur.toFixed(2) + 'px;' +
      '--node-tilt-x:' + tiltX.toFixed(2) + 'deg;' +
      '--node-tilt-y:' + tiltY.toFixed(2) + 'deg;' +
      '--node-specular-alpha:' + specularAlpha.toFixed(3) +
    '">' +
      '<div class="trace-node__hex">' +
        '<div class="trace-node__sequence">step ' + node.sequence + '</div>' +
        '<div class="trace-node__kind">' + escapeHtml(formatTraceKind(node.kind)) + '</div>' +
        '<div class="trace-node__label">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__branch">' + escapeHtml(branchLabel || 'mainline') + '</div>' +
      '</div>' +
      '<div class="trace-node__detail">' +
        '<div class="trace-node__detail-title">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__detail-meta">' + meta + '</div>' +
      '</div>' +
    '</div>'
  );
}

function formatTraceKind(kind) {
  return kind.replace(/_/g, ' ');
}

function drawTraceSnake(board) {
  const canvas = board.querySelector('.trace-canvas');
  const overlay = document.getElementById('trace-overlay');
  const glow = document.getElementById('trace-overlay-glow');
  const trench = document.getElementById('trace-overlay-trench');
  const line = document.getElementById('trace-overlay-line');
  if (!canvas || !overlay || !glow || !trench || !line) {
    return;
  }

  const nodes = Array.from(canvas.querySelectorAll('.trace-node'));
  if (nodes.length < 2) {
    overlay.setAttribute('viewBox', '0 0 1 1');
    glow.setAttribute('d', '');
    trench.setAttribute('d', '');
    line.setAttribute('d', '');
    return;
  }

  const canvasRect = canvas.getBoundingClientRect();
  const points = nodes.map((node) => {
    const rect = node.getBoundingClientRect();
    return {
      x: rect.left - canvasRect.left + rect.width / 2,
      y: rect.top - canvasRect.top + rect.height / 2,
    };
  });

  const width = Math.max(canvas.scrollWidth, Math.ceil(canvasRect.width));
  const height = Math.max(canvas.scrollHeight, Math.ceil(canvasRect.height));
  overlay.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  overlay.setAttribute('width', width);
  overlay.setAttribute('height', height);

  let path = 'M ' + points[0].x + ' ' + points[0].y;
  for (let i = 1; i < points.length; i += 1) {
    const prev = points[i - 1];
    const next = points[i];
    const midX = (prev.x + next.x) / 2;
    path += ' C ' + midX + ' ' + prev.y + ', ' + midX + ' ' + next.y + ', ' + next.x + ' ' + next.y;
  }

  trench.setAttribute('d', path);
  glow.setAttribute('d', path);
  line.setAttribute('d', path);
}

function updateTraceDetailPlacements(board) {
  const canvas = board.querySelector('.trace-canvas');
  if (!canvas) {
    return;
  }

  const bounds = board.getBoundingClientRect();
  const nodes = Array.from(canvas.querySelectorAll('.trace-node'));
  for (const node of nodes) {
    const detail = node.querySelector('.trace-node__detail');
    if (!detail) {
      continue;
    }

    node.removeAttribute('data-detail-x');
    node.removeAttribute('data-detail-y');

    const nodeRect = node.getBoundingClientRect();
    const detailWidth = detail.offsetWidth;
    const detailHeight = detail.offsetHeight;
    const gap = 18;
    const padding = 12;

    const spaceAbove = nodeRect.top - bounds.top;
    const spaceBelow = bounds.bottom - nodeRect.bottom;
    const spaceLeft = nodeRect.left - bounds.left;
    const spaceRight = bounds.right - nodeRect.right;

    const placeBelow = spaceAbove < detailHeight + gap && spaceBelow > spaceAbove;
    const wouldOverflowLeftCentered =
      nodeRect.left + nodeRect.width / 2 - detailWidth / 2 < bounds.left + padding;
    const wouldOverflowRightCentered =
      nodeRect.left + nodeRect.width / 2 + detailWidth / 2 > bounds.right - padding;

    if (placeBelow) {
      node.dataset.detailY = 'below';
    }

    if (wouldOverflowLeftCentered && spaceRight > spaceLeft) {
      node.dataset.detailX = 'right';
    } else if (wouldOverflowRightCentered && spaceLeft >= spaceRight) {
      node.dataset.detailX = 'left';
    }
  }
}

function primeTraceDetailPlacement(event) {
  const node = event.currentTarget;
  const board = document.getElementById('trace-board');
  if (!node || !board) {
    return;
  }
  updateTraceDetailPlacements(board);
}

function bindTraceDetailPlacement(board) {
  const nodes = Array.from(board.querySelectorAll('.trace-node'));
  for (const node of nodes) {
    node.addEventListener('mouseenter', primeTraceDetailPlacement);
    node.addEventListener('focusin', primeTraceDetailPlacement);
  }
}

function renderConversationTranscript(transcript, { reset = false } = {}) {
  if (reset) {
    clearTranscriptMessages();
  }
  for (const entry of transcript.entries) {
    addMessage(entry.speaker === 'assistant' ? 'assistant' : 'user', entry.content);
  }
}

async function refreshConversationTranscript({ reset = false, only_if_changed = false } = {}) {
  try {
    if (!sessionId) return false;
    const res = await fetch('/sessions/' + sessionId + '/transcript');
    if (!res.ok) return false;
    const transcript = await res.json();
    const nextSignature = transcriptSignatureForConversation(transcript);
    if (only_if_changed && nextSignature === transcriptSignature) {
      return false;
    }
    renderConversationTranscript(transcript, { reset });
    transcriptSignature = nextSignature;
    return true;
  } catch (e) { /* ignore fetch errors */ }
  return false;
}

async function bootstrapWebUi() {
  await ensureSession();
  await refreshConversationTranscript({ reset: true });
  connectSSE();
  refreshTraceGraph();
}

bootstrapWebUi();
window.addEventListener('resize', () => {
  if (latestTraceGraph) {
    renderTraceDAG(latestTraceGraph);
  }
});
</script>
