<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paddles</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --orange: #d29922; --red: #f85149; --purple: #bc8cff;
  --pink: #f778ba;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; }

.chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
.trace-panel {
  width: min(48vw, 720px);
  min-width: 420px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 14px;
  background:
    radial-gradient(circle at top right, rgba(88, 166, 255, 0.12), transparent 38%),
    linear-gradient(180deg, rgba(22, 27, 34, 0.96), rgba(13, 17, 23, 0.98));
}

.chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; color: var(--muted); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }

.events-group { align-self: flex-start; width: 100%; }
.event-row { font-size: 12px; color: var(--muted); padding: 2px 0; display: flex; gap: 6px; align-items: baseline; }
.event-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
.event-badge.planner { background: #1f1030; color: var(--purple); }
.event-badge.tool { background: #1a1500; color: var(--orange); }
.event-badge.tool-diff { background: #112a2c; color: var(--green); }
.event-badge.gatherer { background: #0a1a0a; color: var(--green); }
.event-badge.route { background: #0d1a2a; color: var(--accent); }
.event-badge.synthesis { background: #0a1a0a; color: var(--green); }
.event-badge.fallback { background: #200a0a; color: var(--red); }
.diff-lines { display: block; margin-top: 4px; padding-left: 12px; }
.diff-line { white-space: pre; display: block; }
.diff-line.add { color: #3fb950; }
.diff-line.remove { color: #f85149; }
.diff-line.context { color: var(--text); }
.diff-line.meta { color: #8b949e; }
.diff-line.hunk { color: var(--accent); }
.diff-line.noop { color: var(--muted); }

.chat-input { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-input input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.chat-input input:focus { border-color: var(--accent); }
.chat-input button { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
.chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

.trace-header-wrap {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 12px;
}
.trace-header { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.trace-subhead { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
.trace-board {
  --tile-size: clamp(112px, 12vw, 148px);
  flex: 1;
  overflow: auto;
  padding: 4px 6px 20px 4px;
  position: relative;
}
.trace-canvas {
  position: relative;
  min-width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 6px;
}
.trace-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
  z-index: 0;
}
.trace-overlay__glow {
  fill: none;
  stroke: rgba(88, 166, 255, 0.2);
  stroke-width: 14;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.trace-overlay__line {
  fill: none;
  stroke: rgba(188, 140, 255, 0.75);
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 10 12;
}
.trace-row {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 14px;
  justify-content: flex-start;
  overflow: visible;
}
.trace-row.reverse { flex-direction: row-reverse; }
.trace-node {
  position: relative;
  z-index: 1;
  width: var(--tile-size);
  min-width: var(--tile-size);
  aspect-ratio: 1 / 1;
  overflow: visible;
}
.trace-node__hex {
  position: relative;
  width: 100%;
  height: 100%;
  clip-path: polygon(24% 6%, 76% 6%, 100% 50%, 76% 94%, 24% 94%, 0% 50%);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
    color-mix(in srgb, var(--node-color) 18%, rgba(22, 27, 34, 0.92));
  border: 1px solid color-mix(in srgb, var(--node-color) 60%, var(--border));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.04),
    0 10px 24px rgba(0,0,0,0.22);
  padding: 14px 14px 16px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 8px;
  transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
}
.trace-node:hover .trace-node__hex {
  transform: translateY(-4px) scale(1.03);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.06),
    0 18px 34px rgba(0,0,0,0.34);
  border-color: var(--node-color);
}
.trace-node__sequence {
  font-size: 10px;
  color: color-mix(in srgb, var(--node-color) 76%, white);
  opacity: 0.9;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.trace-node__kind {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.trace-node__label {
  font-size: 14px;
  line-height: 1.2;
  font-weight: 600;
  color: var(--text);
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 4;
  overflow: hidden;
  text-overflow: ellipsis;
  word-break: break-word;
}
.trace-node__branch {
  margin-top: auto;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.trace-node__detail {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translate(-50%, calc(-100% - 10px)) scale(0.96);
  width: clamp(180px, 18vw, 280px);
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--node-color) 72%, var(--border));
  background: rgba(13, 17, 23, 0.97);
  box-shadow: 0 18px 42px rgba(0,0,0,0.46);
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 160ms ease, transform 160ms ease;
}
.trace-node:hover .trace-node__detail {
  opacity: 1;
  transform: translate(-50%, calc(-100% - 14px)) scale(1);
}
.trace-node__detail-title {
  font-size: 16px;
  line-height: 1.25;
  font-weight: 700;
  word-break: break-word;
}
.trace-node__detail-meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.45;
}
.trace-empty { color: var(--muted); font-size: 12px; font-style: italic; }

@media (max-width: 960px) {
  body { flex-direction: column; height: auto; min-height: 100vh; }
  .chat-panel { border-right: none; border-bottom: 1px solid var(--border); min-height: 48vh; }
  .trace-panel { width: 100%; min-width: 0; min-height: 42vh; }
}
</style>
</head>
<body>

<div class="chat-panel">
  <div class="chat-header">Paddles</div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="prompt" placeholder="Ask paddles..." autofocus>
    <button id="send" onclick="sendTurn()">Send</button>
  </div>
</div>

<div class="trace-panel">
  <div class="trace-header-wrap">
    <div class="trace-header">Transit Trace</div>
    <div class="trace-subhead">Turn Steps</div>
  </div>
  <div id="trace-board" class="trace-board"></div>
  <div class="trace-empty" id="trace-empty">Submit a prompt to see the trace railroad.</div>
</div>

<script>
let sessionId = null;
let eventSource = null;
const MUTATION_TOOLS = new Set(["diff", "apply_patch"]);

const KIND_COLORS = {
  root: '#58a6ff', turn: '#58a6ff', action: '#bc8cff', branch: '#bc8cff',
  tool: '#d29922', tool_done: '#d29922', evidence: '#3fb950',
  checkpoint: '#3fb950', merge: '#f778ba', thread: '#8b949e'
};

const TRACE_TILE_MIN = 128;
const TRACE_TILE_GAP = 14;
let latestTraceGraph = null;

async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
}

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/events');
  eventSource.addEventListener('turn_event', (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  });
}

function addMessage(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function addEventRow(badge, badgeCls, text, htmlContent = null) {
  let group = document.getElementById('messages').lastElementChild;
  if (!group || !group.classList.contains('events-group')) {
    group = document.createElement('div');
    group.className = 'events-group';
    document.getElementById('messages').appendChild(group);
  }
  const row = document.createElement('div');
  row.className = 'event-row';
  const content = htmlContent === null ? escapeHtml(text) : htmlContent;
  row.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + content + '</span>';
  group.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth' });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDuration(totalSeconds) {
  const seconds = Number(totalSeconds);
  if (!Number.isFinite(seconds) || seconds <= 0) {
    return '0s';
  }
  const s = Math.floor(seconds % 60);
  const m = Math.floor((seconds / 60) % 60);
  const h = Math.floor(seconds / 3600);
  if (h > 0) {
    return `${h}h ${m}m ${s}s`;
  }
  if (m > 0) {
    return `${m}m ${s}s`;
  }
  return `${s}s`;
}

function isMutationTool(toolName) {
  return MUTATION_TOOLS.has(toolName);
}

function extractMutationDiff(toolName, summary) {
  if (!summary) {
    return null;
  }
  if (toolName === "diff") {
    if (summary === "No diff output.") {
      return summary;
    }
    if (summary.startsWith("Diff output:\n")) {
      return summary.slice("Diff output:\n".length);
    }
    if (summary.startsWith("Diff output:\r\n")) {
      return summary.slice("Diff output:\r\n".length);
    }
    return null;
  }
  if (toolName === "apply_patch") {
    if (!summary.startsWith("Applied patch:\n")) {
      return null;
    }
    const body = summary.slice("Applied patch:\n".length);
    return body
      .split("\n\nExit status:")[0]
      .split("\nExit status:")[0]
      .trim();
  }
  return null;
}

function diffLineClass(line) {
  if (
    line.startsWith("+++") ||
    line.startsWith("---") ||
    line.startsWith("diff ") ||
    line.startsWith("index ")
  ) {
    return "meta";
  }
  if (line.startsWith("+")) {
    return "add";
  }
  if (line.startsWith("-")) {
    return "remove";
  }
  if (line.startsWith("@@")) {
    return "hunk";
  }
  if (line.startsWith("\\")) {
    return "noop";
  }
  return "context";
}

function formatDiffForEvent(toolName, diff) {
  const lines = diff
    .split("\n")
    .map(
      (line) =>
        '<span class="diff-line ' +
        diffLineClass(line) +
        '">' +
        escapeHtml(line) +
        "</span>"
    )
    .join("<br>");
  return (
    escapeHtml(toolName + " done") +
    "<br>" +
    "<span class=\"diff-lines\">" +
    lines +
    "</span>"
  );
}

function handleEvent(ev) {
  const t = ev.type;
  if (t === 'intent_classified') {
    addEventRow('route', 'route', 'Intent: ' + ev.intent);
  } else if (t === 'interpretation_context') {
    addEventRow('context', 'route', ev.summary);
  } else if (t === 'planner_action_selected') {
    addEventRow('planner', 'planner', 'Step ' + ev.sequence + ': ' + ev.action);
  } else if (t === 'tool_called') {
    addEventRow('tool', 'tool', ev.tool_name + ': ' + truncate(ev.invocation, 60));
  } else if (t === 'tool_finished') {
    if (isMutationTool(ev.tool_name)) {
      const diff = extractMutationDiff(ev.tool_name, ev.summary);
      if (diff) {
        addEventRow(
          'tool',
          'tool-diff',
          ev.tool_name + ' done',
          formatDiffForEvent(ev.tool_name, diff)
        );
      } else {
        addEventRow('tool', 'tool', ev.tool_name + ' done');
      }
    } else {
      addEventRow('tool', 'tool', ev.tool_name + ' done');
    }
  } else if (t === 'gatherer_summary') {
    addEventRow('gather', 'gatherer', ev.summary);
  } else if (t === 'gatherer_search_progress') {
    const eta = ev.eta_seconds == null ? 'unknown' : formatDuration(ev.eta_seconds);
    const strategy = ev.strategy ? ' strategy=' + ev.strategy : '';
    const details = ev.detail ? ' · ' + ev.detail : '';
    addEventRow(
      'gather',
      'gatherer',
      'searching (' + ev.phase + ')' + strategy + ' · eta ' + eta + details
    );
  } else if (t === 'planner_summary') {
    addEventRow('planner', 'planner', ev.strategy + ' ' + ev.mode + ' (' + ev.steps + ' steps)');
  } else if (t === 'synthesis_ready') {
    if (ev.insufficient_evidence) {
      addEventRow('synth', 'fallback', 'Insufficient evidence');
    } else {
      addEventRow('synth', 'synthesis', ev.grounded ? 'Grounded' : 'Direct');
    }
  } else if (t === 'route_selected') {
    addEventRow('route', 'route', truncate(ev.summary, 80));
  } else if (t === 'fallback') {
    addEventRow('fallback', 'fallback', ev.stage + ': ' + ev.reason);
  } else if (t === 'planner_capability' || t === 'gatherer_capability') {
    addEventRow('cap', 'route', ev.provider + ': ' + ev.capability);
  } else if (t === 'thread_merged') {
    addEventRow('merge', 'planner', ev.source_thread + ' -> ' + ev.target_thread);
  }
  refreshTraceGraph();
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

async function sendTurn() {
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send');
  const text = input.value.trim();
  if (!text) return;
  await ensureSession();

  addMessage('user', text);
  input.value = '';
  btn.disabled = true;

  try {
    const res = await fetch('/sessions/' + sessionId + '/turns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text }),
    });
    const data = await res.json();
    addMessage('assistant', data.response);
    refreshTraceGraph();
  } catch (err) {
    addMessage('system', 'Error: ' + err.message);
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTurn(); }
});

/* Trace railroad rendering from real transit trace data */
let graphDebounce = null;
function refreshTraceGraph() {
  if (graphDebounce) return;
  graphDebounce = setTimeout(async () => {
    graphDebounce = null;
    try {
      const res = await fetch('/trace/graph');
      if (!res.ok) return;
      const graph = await res.json();
      renderTraceDAG(graph);
    } catch (e) { /* ignore fetch errors during turn processing */ }
  }, 200);
}

function renderTraceDAG(graph) {
  latestTraceGraph = graph;
  const board = document.getElementById('trace-board');
  const empty = document.getElementById('trace-empty');
  if (!graph.nodes.length) {
    board.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const sorted = [...graph.nodes].sort((a, b) => a.sequence - b.sequence);
  const branchLabels = Object.fromEntries(
    (graph.branches || []).map((branch) => [branch.id, branch.label])
  );
  const columns = Math.max(
    2,
    Math.floor((Math.max(board.clientWidth, 280) + TRACE_TILE_GAP) / (TRACE_TILE_MIN + TRACE_TILE_GAP))
  );
  const rows = [];
  for (let i = 0; i < sorted.length; i += columns) {
    rows.push(sorted.slice(i, i + columns));
  }

  board.innerHTML =
    '<div class="trace-canvas">' +
      '<svg class="trace-overlay" id="trace-overlay" aria-hidden="true">' +
        '<path class="trace-overlay__glow" id="trace-overlay-glow"></path>' +
        '<path class="trace-overlay__line" id="trace-overlay-line"></path>' +
      '</svg>' +
      rows
        .map((row, rowIndex) => {
          const reverse = rowIndex % 2 === 1 ? ' reverse' : '';
          return '<div class="trace-row' + reverse + '">' +
            row.map((node) => renderTraceNode(node, branchLabels)).join('') +
          '</div>';
        })
        .join('') +
    '</div>';

  requestAnimationFrame(() => drawTraceSnake(board));
}

function renderTraceNode(node, branchLabels) {
  const color = KIND_COLORS[node.kind] || '#8b949e';
  const branchLabel = node.branch_id && branchLabels[node.branch_id]
    ? branchLabels[node.branch_id]
    : null;
  const meta = [
    'kind: ' + escapeHtml(formatTraceKind(node.kind)),
    branchLabel ? 'branch: ' + escapeHtml(branchLabel) : null,
    'record: ' + escapeHtml(node.id)
  ].filter(Boolean).join('<br>');

  return (
    '<div class="trace-node" style="--node-color:' + color + '">' +
      '<div class="trace-node__hex">' +
        '<div class="trace-node__sequence">step ' + node.sequence + '</div>' +
        '<div class="trace-node__kind">' + escapeHtml(formatTraceKind(node.kind)) + '</div>' +
        '<div class="trace-node__label">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__branch">' + escapeHtml(branchLabel || 'mainline') + '</div>' +
      '</div>' +
      '<div class="trace-node__detail">' +
        '<div class="trace-node__detail-title">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__detail-meta">' + meta + '</div>' +
      '</div>' +
    '</div>'
  );
}

function formatTraceKind(kind) {
  return kind.replace(/_/g, ' ');
}

function drawTraceSnake(board) {
  const canvas = board.querySelector('.trace-canvas');
  const overlay = document.getElementById('trace-overlay');
  const glow = document.getElementById('trace-overlay-glow');
  const line = document.getElementById('trace-overlay-line');
  if (!canvas || !overlay || !glow || !line) {
    return;
  }

  const nodes = Array.from(canvas.querySelectorAll('.trace-node'));
  if (nodes.length < 2) {
    overlay.setAttribute('viewBox', '0 0 1 1');
    glow.setAttribute('d', '');
    line.setAttribute('d', '');
    return;
  }

  const canvasRect = canvas.getBoundingClientRect();
  const points = nodes.map((node) => {
    const rect = node.getBoundingClientRect();
    return {
      x: rect.left - canvasRect.left + rect.width / 2,
      y: rect.top - canvasRect.top + rect.height / 2,
    };
  });

  const width = Math.max(canvas.scrollWidth, Math.ceil(canvasRect.width));
  const height = Math.max(canvas.scrollHeight, Math.ceil(canvasRect.height));
  overlay.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  overlay.setAttribute('width', width);
  overlay.setAttribute('height', height);

  let path = 'M ' + points[0].x + ' ' + points[0].y;
  for (let i = 1; i < points.length; i += 1) {
    const prev = points[i - 1];
    const next = points[i];
    const midX = (prev.x + next.x) / 2;
    path += ' C ' + midX + ' ' + prev.y + ', ' + midX + ' ' + next.y + ', ' + next.x + ' ' + next.y;
  }

  glow.setAttribute('d', path);
  line.setAttribute('d', path);
}

async function replayHistory() {
  try {
    const res = await fetch('/trace/replay');
    if (!res.ok) return;
    const replays = await res.json();
    for (const replay of replays) {
      for (const record of replay.records) {
        const k = record.kind;
        if (typeof k === 'object') {
          if ('TaskRootStarted' in k) {
            const root = k.TaskRootStarted;
            if (root.prompt && root.prompt.inline_content) {
              addMessage('user', root.prompt.inline_content);
            }
          } else if ('TurnStarted' in k) {
            const turn = k.TurnStarted;
            if (turn.prompt && turn.prompt.inline_content) {
              addMessage('user', turn.prompt.inline_content);
            }
          } else if ('PlannerAction' in k) {
            addEventRow('planner', 'planner', k.PlannerAction.action);
          } else if ('ToolCallRequested' in k) {
            addEventRow('tool', 'tool', k.ToolCallRequested.tool_name);
          } else if ('ToolCallCompleted' in k) {
            const tool = k.ToolCallCompleted.tool_name;
            const summary = k.ToolCallCompleted.payload && k.ToolCallCompleted.payload.summary
              ? k.ToolCallCompleted.payload.summary
              : '';
            const diff = isMutationTool(tool) ? extractMutationDiff(tool, summary) : null;
            if (diff) {
              addEventRow('tool', 'tool-diff', tool + ' done', formatDiffForEvent(tool, diff));
            } else {
              addEventRow('tool', 'tool', tool + ' done');
            }
          } else if ('CompletionCheckpoint' in k) {
            const cp = k.CompletionCheckpoint;
            if (cp.response && cp.response.inline_content) {
              addMessage('assistant', cp.response.inline_content);
            }
          } else if ('SelectionArtifact' in k) {
            addEventRow('evidence', 'gatherer', k.SelectionArtifact.summary);
          }
        }
      }
    }
  } catch (e) { /* ignore fetch errors */ }
}

replayHistory().then(() => refreshTraceGraph());
connectSSE();
window.addEventListener('resize', () => {
  if (latestTraceGraph) {
    renderTraceDAG(latestTraceGraph);
  }
});
</script>
</body>
