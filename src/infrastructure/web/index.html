<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paddles</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --orange: #d29922; --red: #f85149; --purple: #bc8cff;
  --pink: #f778ba;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; }

.chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
.trace-panel { width: 380px; display: flex; flex-direction: column; overflow-y: auto; padding: 12px; }

.chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; color: var(--muted); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }

.events-group { align-self: flex-start; width: 100%; }
.event-row { font-size: 12px; color: var(--muted); padding: 2px 0; display: flex; gap: 6px; align-items: baseline; }
.event-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
.event-badge.planner { background: #1f1030; color: var(--purple); }
.event-badge.tool { background: #1a1500; color: var(--orange); }
.event-badge.gatherer { background: #0a1a0a; color: var(--green); }
.event-badge.route { background: #0d1a2a; color: var(--accent); }
.event-badge.synthesis { background: #0a1a0a; color: var(--green); }
.event-badge.fallback { background: #200a0a; color: var(--red); }

.chat-input { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-input input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.chat-input input:focus { border-color: var(--accent); }
.chat-input button { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
.chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

.trace-header { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.trace-svg { width: 100%; }
.trace-empty { color: var(--muted); font-size: 12px; font-style: italic; }
</style>
</head>
<body>

<div class="chat-panel">
  <div class="chat-header">Paddles</div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="prompt" placeholder="Ask paddles..." autofocus>
    <button id="send" onclick="sendTurn()">Send</button>
  </div>
</div>

<div class="trace-panel">
  <div class="trace-header">Transit Trace</div>
  <svg id="trace-svg" class="trace-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="trace-empty" id="trace-empty">Submit a prompt to see the trace railroad.</div>
</div>

<script>
let sessionId = null;
let eventSource = null;

const KIND_COLORS = {
  root: '#58a6ff', turn: '#58a6ff', action: '#bc8cff', branch: '#bc8cff',
  tool: '#d29922', tool_done: '#d29922', evidence: '#3fb950',
  checkpoint: '#3fb950', merge: '#f778ba', thread: '#8b949e'
};

const LANE_W = 160, NODE_H = 44, GAP_Y = 14, PAD_X = 16, PAD_Y = 20;
const HEX_RX = 64, HEX_RY = 18;

async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
}

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/events');
  eventSource.addEventListener('turn_event', (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  });
}

function addMessage(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function addEventRow(badge, badgeCls, text) {
  let group = document.getElementById('messages').lastElementChild;
  if (!group || !group.classList.contains('events-group')) {
    group = document.createElement('div');
    group.className = 'events-group';
    document.getElementById('messages').appendChild(group);
  }
  const row = document.createElement('div');
  row.className = 'event-row';
  row.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + escapeHtml(text) + '</span>';
  group.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth' });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function handleEvent(ev) {
  const t = ev.type;
  if (t === 'intent_classified') {
    addEventRow('route', 'route', 'Intent: ' + ev.intent);
  } else if (t === 'interpretation_context') {
    addEventRow('context', 'route', ev.summary);
  } else if (t === 'planner_action_selected') {
    addEventRow('planner', 'planner', 'Step ' + ev.sequence + ': ' + ev.action);
  } else if (t === 'tool_called') {
    addEventRow('tool', 'tool', ev.tool_name + ': ' + truncate(ev.invocation, 60));
  } else if (t === 'tool_finished') {
    addEventRow('tool', 'tool', ev.tool_name + ' done');
  } else if (t === 'gatherer_summary') {
    addEventRow('gather', 'gatherer', ev.summary);
  } else if (t === 'planner_summary') {
    addEventRow('planner', 'planner', ev.strategy + ' ' + ev.mode + ' (' + ev.steps + ' steps)');
  } else if (t === 'synthesis_ready') {
    if (ev.insufficient_evidence) {
      addEventRow('synth', 'fallback', 'Insufficient evidence');
    } else {
      addEventRow('synth', 'synthesis', ev.grounded ? 'Grounded' : 'Direct');
    }
  } else if (t === 'route_selected') {
    addEventRow('route', 'route', truncate(ev.summary, 80));
  } else if (t === 'fallback') {
    addEventRow('fallback', 'fallback', ev.stage + ': ' + ev.reason);
  } else if (t === 'planner_capability' || t === 'gatherer_capability') {
    addEventRow('cap', 'route', ev.provider + ': ' + ev.capability);
  } else if (t === 'thread_merged') {
    addEventRow('merge', 'planner', ev.source_thread + ' -> ' + ev.target_thread);
  }
  refreshTraceGraph();
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

async function sendTurn() {
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send');
  const text = input.value.trim();
  if (!text) return;
  await ensureSession();

  addMessage('user', text);
  input.value = '';
  btn.disabled = true;

  try {
    const res = await fetch('/sessions/' + sessionId + '/turns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text }),
    });
    const data = await res.json();
    addMessage('assistant', data.response);
    refreshTraceGraph();
  } catch (err) {
    addMessage('system', 'Error: ' + err.message);
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTurn(); }
});

/* Trace railroad rendering from real transit trace data */
let graphDebounce = null;
function refreshTraceGraph() {
  if (graphDebounce) return;
  graphDebounce = setTimeout(async () => {
    graphDebounce = null;
    if (!sessionId) return;
    try {
      const res = await fetch('/trace/graph');
      if (!res.ok) return;
      const graph = await res.json();
      renderTraceDAG(graph);
    } catch (e) { /* ignore fetch errors during turn processing */ }
  }, 200);
}

function renderTraceDAG(graph) {
  if (graph.nodes.length === 0) return;
  document.getElementById('trace-empty').style.display = 'none';

  // Assign lane indices: null branch = lane 0, each unique branch_id gets a lane
  const branchLanes = {};
  let nextLane = 1;
  for (const b of graph.branches) {
    if (!(b.id in branchLanes)) branchLanes[b.id] = nextLane++;
  }
  const laneCount = nextLane;

  // Sort nodes by sequence, assign y positions
  const sorted = [...graph.nodes].sort((a, b) => a.sequence - b.sequence);
  const nodePos = {};
  for (let i = 0; i < sorted.length; i++) {
    const node = sorted[i];
    const lane = node.branch_id ? (branchLanes[node.branch_id] || 0) : 0;
    const cx = PAD_X + lane * LANE_W + HEX_RX + 4;
    const cy = PAD_Y + i * (NODE_H + GAP_Y) + HEX_RY;
    nodePos[node.id] = { cx, cy, node };
  }

  const totalW = PAD_X * 2 + laneCount * LANE_W;
  const totalH = PAD_Y * 2 + sorted.length * (NODE_H + GAP_Y);
  const svg = document.getElementById('trace-svg');
  svg.setAttribute('viewBox', '0 0 ' + totalW + ' ' + totalH);
  svg.setAttribute('height', totalH);

  let html = '';

  // Draw edges
  for (const edge of graph.edges) {
    const from = nodePos[edge.from];
    const to = nodePos[edge.to];
    if (!from || !to) continue;
    if (from.cx === to.cx) {
      // Straight vertical
      html += '<line x1="' + from.cx + '" y1="' + (from.cy + HEX_RY) + '" x2="' + to.cx + '" y2="' + (to.cy - HEX_RY) + '" stroke="#30363d" stroke-width="2"/>';
    } else {
      // Curved for cross-lane edges (branch/merge)
      const mx = (from.cx + to.cx) / 2;
      const my = (from.cy + HEX_RY + to.cy - HEX_RY) / 2;
      html += '<path d="M' + from.cx + ' ' + (from.cy + HEX_RY) + ' Q' + from.cx + ' ' + my + ' ' + mx + ' ' + my + ' Q' + to.cx + ' ' + my + ' ' + to.cx + ' ' + (to.cy - HEX_RY) + '" fill="none" stroke="#30363d" stroke-width="2"/>';
    }
  }

  // Draw nodes
  for (const id in nodePos) {
    const { cx, cy, node } = nodePos[id];
    const color = KIND_COLORS[node.kind] || '#8b949e';
    const pts = hexPoints(cx, cy, HEX_RX, HEX_RY);
    html += '<polygon points="' + pts + '" fill="' + color + '22" stroke="' + color + '" stroke-width="1.5"/>';
    html += '<text x="' + cx + '" y="' + (cy + 4) + '" text-anchor="middle" fill="' + color + '" font-size="10" font-family="monospace">' + escapeHtml(node.label) + '</text>';
  }

  svg.innerHTML = html;
}

function hexPoints(cx, cy, rx, ry) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 3 * i - Math.PI / 6;
    pts.push((cx + rx * Math.cos(angle)).toFixed(1) + ',' + (cy + ry * Math.sin(angle)).toFixed(1));
  }
  return pts.join(' ');
}

connectSSE();
refreshTraceGraph();
</script>
</body>
</html>
