async function refreshForensics({
  preserveSelection = true,
  preferProvisionalTurnId = null,
  preferProvisionalRecordId = null
} = {}) {
  try {
    if (!sessionId) return false;
    const res = await fetch('/sessions/' + sessionId + '/forensics');
    if (!res.ok) return false;
    const projection = await res.json();
    latestForensics = projection;
    if (!preserveSelection) {
      selectedTurnId = null;
      selectedRecordId = null;
      selectedSelectionMode = 'record';
      selectedFocus = { kind: 'all', id: null };
      forensicTailMode = true;
    } else if (forensicTailMode && selectedSelectionMode !== 'conversation') {
      if (preferProvisionalTurnId && projectionTurns().some((turn) => turn.turn_id === preferProvisionalTurnId)) {
        selectedTurnId = preferProvisionalTurnId;
      }
      const turn = currentTurn();
      if (selectedSelectionMode === 'record' && turn) {
        const scopedRecords = recordsForTurn(turn);
        if (scopedRecords.length) {
          const preferredRecordExists = preferProvisionalRecordId
            && scopedRecords.some((recordProjection) => recordProjection.record.record_id === preferProvisionalRecordId);
          selectedRecordId = preferredRecordExists
            ? preferProvisionalRecordId
            : scopedRecords[scopedRecords.length - 1].record.record_id;
        }
      }
    }
    renderForensics();
    return true;
  } catch (err) {
    return false;
  }
}

async function refreshManifold() {
  try {
    if (!sessionId) return false;
    const res = await fetch('/sessions/' + sessionId + '/manifold');
    if (!res.ok) return false;
    latestManifold = await res.json();
    const turn = currentManifoldTurn();
    if (!turn || !turn.frames.length) {
      stopManifoldPlayback();
      manifoldTailMode = true;
      manifoldFrameIndex = null;
    } else if (manifoldTailMode) {
      manifoldFrameIndex = turn.frames.length - 1;
    } else {
      manifoldFrameIndex = Math.max(0, Math.min(turn.frames.length - 1, manifoldFrameIndex == null ? 0 : manifoldFrameIndex));
    }
    if (activeTraceView === 'manifold') {
      renderManifoldShell();
    }
    return true;
  } catch (err) {
    return false;
  }
}

function renderConversationTranscript(transcript, { reset = false } = {}) {
  if (reset) {
    clearTranscriptMessages();
  }
  for (const entry of transcript.entries) {
    addMessage(entry.speaker === 'assistant' ? 'assistant' : 'user', entry.content);
  }
}

async function refreshConversationTranscript({ reset = false, only_if_changed = false } = {}) {
  try {
    if (!sessionId) return false;
    const res = await fetch('/sessions/' + sessionId + '/transcript');
    if (!res.ok) return false;
    const transcript = await res.json();
    const nextSignature = transcriptSignatureForConversation(transcript);
    if (only_if_changed && nextSignature === transcriptSignature) {
      return false;
    }
    renderConversationTranscript(transcript, { reset });
    transcriptSignature = nextSignature;
    return true;
  } catch (err) {
    return false;
  }
}

async function sendTurn() {
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send');
  const text = input.value.trim();
  if (!text) return;
  await ensureSession();

  input.value = '';
  btn.disabled = true;

  try {
    const res = await fetch('/sessions/' + sessionId + '/turns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text })
    });
    if (!res.ok) {
      throw new Error('Request failed with status ' + res.status);
    }
    await res.json();
    await refreshConversationTranscript({ reset: true, only_if_changed: true });
    await refreshForensics({ preserveSelection: true });
    await refreshManifold();
    refreshTraceGraph();
  } catch (err) {
    addMessage('system', 'Error: ' + err.message);
  }

  btn.disabled = false;
  input.focus();
}

function refreshTraceGraph() {
  if (graphDebounce) return;
  graphDebounce = setTimeout(async () => {
    graphDebounce = null;
    try {
      if (!sessionId) return;
      const res = await fetch('/sessions/' + sessionId + '/trace/graph');
      if (!res.ok) return;
      const graph = await res.json();
      renderTraceDAG(graph);
    } catch (err) {
      /* ignore fetch errors during turn processing */
    }
  }, 200);
}

function renderTraceDAG(graph) {
  latestTraceGraph = graph;
  const board = document.getElementById('trace-board');
  const empty = document.getElementById('trace-empty');
  const layout = traceLayoutForZoom(traceZoom);
  board.style.setProperty('--trace-scale', traceZoom.toFixed(3));
  board.style.setProperty('--trace-column-gap', layout.columnGap.toFixed(2) + 'px');
  board.style.setProperty('--trace-row-gap', layout.rowGap.toFixed(2) + 'px');
  board.dataset.detailLevel = layout.detailLevel;
  applyTracePanTransform(board);
  if (!graph.nodes.length) {
    board.innerHTML = '';
    empty.style.display = 'block';
    syncTransitTraceControls(0, 0, layout.detailLevel);
    return;
  }

  const sorted = [...graph.nodes].sort((a, b) => a.sequence - b.sequence);
  let visibleNodes = sorted.filter(traceNodeVisible);
  if (!visibleNodes.length && traceScopeMode === 'significant') {
    traceScopeMode = 'full';
    visibleNodes = sorted.slice();
    traceReframePending = true;
  }
  syncTransitTraceControls(visibleNodes.length, sorted.length, layout.detailLevel);
  if (!visibleNodes.length) {
    board.innerHTML = '';
    empty.textContent = 'Current transit toggles hide every step. Re-enable a family or switch to full trace.';
    empty.style.display = 'block';
    board.dataset.traceInitialized = 'false';
    return;
  }

  empty.textContent = 'Submit a prompt to see the trace railroad.';
  empty.style.display = 'none';
  const branchLabels = Object.fromEntries((graph.branches || []).map((branch) => [branch.id, branch.label]));
  const columns = Math.max(2, Math.floor((Math.max(board.clientWidth, 280) + layout.columnGap) / (layout.tileMin + layout.columnGap)));
  const rows = [];
  for (let i = 0; i < visibleNodes.length; i += columns) {
    rows.push(visibleNodes.slice(i, i + columns));
  }

  board.innerHTML =
    '<div class="trace-canvas">' +
      '<svg class="trace-overlay" id="trace-overlay" aria-hidden="true">' +
        '<path class="trace-overlay__glow" id="trace-overlay-glow"></path>' +
        '<path class="trace-overlay__trench" id="trace-overlay-trench"></path>' +
        '<path class="trace-overlay__line" id="trace-overlay-line"></path>' +
      '</svg>' +
      rows.map((row, rowIndex) => {
        const reverse = rowIndex % 2 === 1 ? ' reverse' : '';
        return '<div class="trace-row' + reverse + '">' + row.map((node, nodeIndex) => renderTraceNode(node, branchLabels, visibleNodes.length - (rowIndex * columns + nodeIndex) - 1, visibleNodes.length, traceNodeDirection(rowIndex, nodeIndex, row.length, rows.length), layout.detailLevel)).join('') + '</div>';
      }).join('') +
    '</div>';

  if (traceReframePending || board.dataset.traceInitialized !== 'true') {
    resetTraceViewTransform(board);
    traceReframePending = false;
    board.dataset.traceInitialized = 'true';
  }
  applyTracePanTransform(board);
  bindTraceDetailPlacement(board);
  requestAnimationFrame(() => {
    drawTraceSnake(board);
    updateTraceDetailPlacements(board);
  });
}

function traceNodeDirection(rowIndex, nodeIndex, rowLength, totalRows) {
  const isReverseRow = rowIndex % 2 === 1;
  const isRowTail = nodeIndex === rowLength - 1;
  const hasNextRow = rowIndex < totalRows - 1;
  if (isRowTail && hasNextRow) {
    return 'down';
  }
  return isReverseRow ? 'rtl' : 'ltr';
}

function renderTraceNode(node, branchLabels, recencyIndex, totalNodes, direction, detailLevel) {
  const color = KIND_COLORS[node.kind] || '#8b949e';
  const branchLabel = node.branch_id && branchLabels[node.branch_id] ? branchLabels[node.branch_id] : null;
  const recencyRatio = totalNodes <= 1 ? 1 : 1 - (recencyIndex / Math.max(totalNodes - 1, 1));
  const depth = Math.max(0, Math.min(1, recencyRatio));
  const sunTrailDepth = Math.max(0, 1 - (recencyIndex / 3));
  const raise = -(2 + depth * 6);
  const shadowX = 5 + depth * 2.5;
  const shadowY = 6 + depth * 4;
  const shadowBlur = 12 + depth * 7;
  const shadowAlpha = 0.1 + depth * 0.12;
  const specularAlpha = 0.68 + depth * 0.2;
  const shadowWarmAlpha = 0.02 + sunTrailDepth * 0.1;
  const shadowWarmX = 1 + sunTrailDepth * 2;
  const shadowWarmY = 2 + sunTrailDepth * 4;
  const shadowWarmBlur = 4 + sunTrailDepth * 10;
  const tiltX = direction === 'down' ? 8 : 5;
  const tiltY = direction === 'ltr' ? -4 : direction === 'rtl' ? 4 : 0;
  const classes = ['trace-node'];
  if (recencyIndex === 0) {
    classes.push('trace-node--latest');
  }
  classes.push('trace-node--' + direction);
  const meta = [
    'kind: ' + escapeHtml(formatTraceKind(node.kind)),
    branchLabel ? 'branch: ' + escapeHtml(branchLabel) : null,
    'record: ' + escapeHtml(node.id)
  ].filter(Boolean).join('<br>');
  const summary = detailLevel === 'overview'
    ? escapeHtml(node.id)
    : branchLabel
      ? escapeHtml(branchLabel)
      : escapeHtml(formatTraceKind(node.kind));

  return '<div class="' + classes.join(' ') + '" style="' +
    '--node-color:' + color + ';' +
    '--node-raise:' + raise.toFixed(2) + 'px;' +
    '--node-shadow-x:' + shadowX.toFixed(2) + 'px;' +
    '--node-shadow-y:' + shadowY.toFixed(2) + 'px;' +
    '--node-shadow-blur:' + shadowBlur.toFixed(2) + 'px;' +
    '--node-shadow-alpha:' + shadowAlpha.toFixed(3) + ';' +
    '--node-shadow-warm-alpha:' + shadowWarmAlpha.toFixed(3) + ';' +
    '--node-shadow-warm-x:' + shadowWarmX.toFixed(2) + 'px;' +
    '--node-shadow-warm-y:' + shadowWarmY.toFixed(2) + 'px;' +
    '--node-shadow-warm-blur:' + shadowWarmBlur.toFixed(2) + 'px;' +
    '--node-tilt-x:' + tiltX.toFixed(2) + 'deg;' +
    '--node-tilt-y:' + tiltY.toFixed(2) + 'deg;' +
    '--node-specular-alpha:' + specularAlpha.toFixed(3) + '">' +
      '<div class="trace-node__hex">' +
        '<div class="trace-node__sequence">step ' + node.sequence + '</div>' +
        '<div class="trace-node__kind">' + escapeHtml(formatTraceKind(node.kind)) + '</div>' +
        '<div class="trace-node__label">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__summary">' + summary + '</div>' +
        '<div class="trace-node__branch">' + escapeHtml(branchLabel || 'mainline') + '</div>' +
      '</div>' +
      '<div class="trace-node__detail">' +
        '<div class="trace-node__detail-title">' + escapeHtml(node.label) + '</div>' +
        '<div class="trace-node__detail-meta">' + meta + '</div>' +
      '</div>' +
    '</div>';
}

function formatTraceKind(kind) {
  return kind.replace(/_/g, ' ');
}

function drawTraceSnake(board) {
  const canvas = board.querySelector('.trace-canvas');
  const overlay = document.getElementById('trace-overlay');
  const glow = document.getElementById('trace-overlay-glow');
  const trench = document.getElementById('trace-overlay-trench');
  const line = document.getElementById('trace-overlay-line');
  if (!canvas || !overlay || !glow || !trench || !line) {
    return;
  }

  const nodes = Array.from(canvas.querySelectorAll('.trace-node'));
  if (nodes.length < 2) {
    overlay.setAttribute('viewBox', '0 0 1 1');
    glow.setAttribute('d', '');
    trench.setAttribute('d', '');
    line.setAttribute('d', '');
    return;
  }

  const canvasRect = canvas.getBoundingClientRect();
  const points = nodes.map((node) => {
    const rect = node.getBoundingClientRect();
    return {
      x: rect.left - canvasRect.left + rect.width / 2,
      y: rect.top - canvasRect.top + rect.height / 2
    };
  });

  const width = Math.max(canvas.scrollWidth, Math.ceil(canvasRect.width));
  const height = Math.max(canvas.scrollHeight, Math.ceil(canvasRect.height));
  overlay.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  overlay.setAttribute('width', width);
  overlay.setAttribute('height', height);

  let path = 'M ' + points[0].x + ' ' + points[0].y;
  for (let i = 1; i < points.length; i += 1) {
    const prev = points[i - 1];
    const next = points[i];
    const midX = (prev.x + next.x) / 2;
    path += ' C ' + midX + ' ' + prev.y + ', ' + midX + ' ' + next.y + ', ' + next.x + ' ' + next.y;
  }

  trench.setAttribute('d', path);
  glow.setAttribute('d', path);
  line.setAttribute('d', path);
}

function updateTraceDetailPlacements(board) {
  const canvas = board.querySelector('.trace-canvas');
  if (!canvas) {
    return;
  }

  const bounds = board.getBoundingClientRect();
  const nodes = Array.from(canvas.querySelectorAll('.trace-node'));
  for (const node of nodes) {
    const detail = node.querySelector('.trace-node__detail');
    if (!detail) {
      continue;
    }

    node.removeAttribute('data-detail-x');
    node.removeAttribute('data-detail-y');

    const nodeRect = node.getBoundingClientRect();
    const detailWidth = detail.offsetWidth;
    const detailHeight = detail.offsetHeight;
    const gap = 18;
    const padding = 12;
    const spaceAbove = nodeRect.top - bounds.top;
    const spaceBelow = bounds.bottom - nodeRect.bottom;
    const spaceLeft = nodeRect.left - bounds.left;
    const spaceRight = bounds.right - nodeRect.right;
    const placeBelow = spaceAbove < detailHeight + gap && spaceBelow > spaceAbove;
    const wouldOverflowLeftCentered = nodeRect.left + nodeRect.width / 2 - detailWidth / 2 < bounds.left + padding;
    const wouldOverflowRightCentered = nodeRect.left + nodeRect.width / 2 + detailWidth / 2 > bounds.right - padding;

    if (placeBelow) {
      node.dataset.detailY = 'below';
    }
    if (wouldOverflowLeftCentered && spaceRight > spaceLeft) {
      node.dataset.detailX = 'right';
    } else if (wouldOverflowRightCentered && spaceLeft >= spaceRight) {
      node.dataset.detailX = 'left';
    }
  }
}

function primeTraceDetailPlacement(event) {
  const node = event.currentTarget;
  const board = document.getElementById('trace-board');
  if (!node || !board) {
    return;
  }
  updateTraceDetailPlacements(board);
}

function bindTraceDetailPlacement(board) {
  const nodes = Array.from(board.querySelectorAll('.trace-node'));
  for (const node of nodes) {
    node.addEventListener('mouseenter', primeTraceDetailPlacement);
    node.addEventListener('focusin', primeTraceDetailPlacement);
  }
}

async function bootstrapWebUi() {
  wireStaticUi();
  syncTraceViewFromLocation();
  await ensureSession();
  await refreshConversationTranscript({ reset: true });
  await refreshForensics({ preserveSelection: false });
  await refreshManifold();
  connectSSE();
  refreshTraceGraph();
}

bootstrapWebUi();
window.addEventListener('popstate', syncTraceViewFromLocation);
window.addEventListener('resize', () => {
  if (latestTraceGraph && activeTraceView === 'transit') {
    renderTraceDAG(latestTraceGraph);
  }
});
</script>
