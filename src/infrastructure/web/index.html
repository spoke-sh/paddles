function truncate(s, n) {
  const text = s == null ? '' : String(s);
  return text.length > n ? text.substring(0, n) + '...' : text;
}

async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
}

function wireStaticUi() {
  document.getElementById('prompt').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTurn();
    }
  });

  document.querySelectorAll('.trace-tab').forEach((button) => {
    button.addEventListener('click', () => {
      setTraceView(button.dataset.traceView);
    });
  });

  document.querySelectorAll('[data-trace-scope]').forEach((button) => {
    button.addEventListener('click', () => {
      traceScopeMode = button.dataset.traceScope || 'significant';
      traceReframePending = true;
      syncTransitTraceControls();
      if (latestTraceGraph) {
        renderTraceDAG(latestTraceGraph);
      }
    });
  });

  document.querySelectorAll('[data-trace-family]').forEach((button) => {
    button.addEventListener('click', () => {
      const family = button.dataset.traceFamily;
      if (!family) {
        return;
      }
      traceFamilyVisibility[family] = !traceFamilyVisibility[family];
      traceReframePending = true;
      syncTransitTraceControls();
      if (latestTraceGraph) {
        renderTraceDAG(latestTraceGraph);
      }
    });
  });

  document.querySelectorAll('.forensic-toggle').forEach((button) => {
    button.addEventListener('click', () => {
      setDetailMode(button.dataset.detailMode);
    });
  });

  document.getElementById('manifold-play-toggle').addEventListener('click', toggleManifoldPlayback);
  document.getElementById('manifold-replay-button').addEventListener('click', replayManifold);
  document.getElementById('manifold-time-scrubber').addEventListener('input', (event) => {
    const nextIndex = Number.parseInt(event.target.value || '0', 10);
    stopManifoldPlayback();
    manifoldTailMode = false;
    manifoldFrameIndex = Number.isFinite(nextIndex) ? nextIndex : 0;
    renderManifoldShell();
  });

  bindTraceZoom(document.getElementById('trace-board'));
  bindTracePan(document.getElementById('trace-board'));
  syncTransitTraceControls();
}

function normalizedTracePath(pathname) {
  const path = pathname || '/';
  if (path.length > 1 && path.endsWith('/')) {
    return path.slice(0, -1);
  }
  return path;
}

function traceRouteFamily(pathname) {
  return 'primary';
}

function traceViewFromPath(pathname) {
  const path = normalizedTracePath(pathname);
  const relativePath = path;
  if (relativePath === '/manifold') {
    return 'manifold';
  }
  if (relativePath === '/transit') {
    return 'transit';
  }
  return 'inspector';
}

function tracePathForView(view, pathname = window.location.pathname) {
  const routePath = TRACE_VIEW_PATHS[view] || '/';
  return routePath;
}

function setTraceView(view, { syncHistory = true } = {}) {
  activeTraceView = view;
  document.querySelectorAll('.trace-tab').forEach((button) => {
    button.classList.toggle('is-active', button.dataset.traceView === view);
  });
  document.getElementById('forensic-view').classList.toggle('trace-view--active', view === 'inspector');
  document.getElementById('manifold-view').classList.toggle('trace-view--active', view === 'manifold');
  document.getElementById('transit-view').classList.toggle('trace-view--active', view === 'transit');
  document.getElementById('trace-subhead').textContent = TRACE_VIEW_LABELS[view] || 'Transit Trace';
  if (syncHistory) {
    const nextPath = tracePathForView(view);
    if (normalizedTracePath(window.location.pathname) !== nextPath) {
      window.history.pushState({ traceView: view }, '', nextPath);
    }
  }
  if (view === 'manifold') {
    renderManifoldShell();
    refreshManifold();
  } else {
    stopManifoldPlayback();
  }
  if (view === 'transit' && latestTraceGraph) {
    traceReframePending = true;
    renderTraceDAG(latestTraceGraph);
  }
}

function syncTraceViewFromLocation() {
  setTraceView(traceViewFromPath(window.location.pathname), { syncHistory: false });
}

function setDetailMode(mode) {
  selectedDetailMode = mode;
  document.querySelectorAll('.forensic-toggle').forEach((button) => {
    button.classList.toggle('is-active', button.dataset.detailMode === mode);
  });
  renderForensicDetail();
}

function manifoldSignalLabel(signal) {
  if (!signal) {
    return 'Unknown signal';
  }
  return titleCase(signal.kind || 'signal');
}

function manifoldAnchorLabel(anchor) {
  if (!anchor) {
    return 'Conversation scope';
  }
  return (anchor.label && String(anchor.label).trim()) || titleCase(anchor.kind || 'anchor');
}

function manifoldPrimitiveKindLabel(kind) {
  return titleCase(kind || 'primitive');
}

function manifoldPrimitiveBasisLabel(basis) {
  if (!basis || !basis.kind) {
    return 'basis: unknown';
  }
  if (basis.kind === 'signal_family') {
    return 'basis: ' + titleCase(basis.signal_kind || 'signal');
  }
  if (basis.kind === 'lineage_anchor' && basis.anchor) {
    return 'basis: ' + manifoldAnchorLabel(basis.anchor);
  }
  return 'basis: ' + titleCase(basis.kind);
}

function manifoldLifecycleClass(lifecycle) {
  return String(lifecycle || 'provisional');
}

function manifoldLifecycleLabel(lifecycle) {
  return titleCase(String(lifecycle || 'provisional').replace(/_/g, ' '));
}

function manifoldLifecycleBadge(lifecycle, className = 'manifold-node__badge') {
  const lifecycleClass = manifoldLifecycleClass(lifecycle);
  return '<span class="' + className + ' is-' + escapeHtml(lifecycleClass) + '">' +
    escapeHtml(manifoldLifecycleLabel(lifecycle)) +
  '</span>';
}

function manifoldTurnStartSequence(turn) {
  if (!turn || !Array.isArray(turn.frames) || !turn.frames.length) {
    return Number.MAX_SAFE_INTEGER;
  }
  return Number(turn.frames[0].sequence || Number.MAX_SAFE_INTEGER);
}

function mergeManifoldTurnProjection(turnProjection) {
  if (!turnProjection) {
    return null;
  }

  const taskId =
    (latestManifold && latestManifold.task_id) ||
    (latestForensics && latestForensics.task_id) ||
    sessionId ||
    '';
  const turns = latestManifold && Array.isArray(latestManifold.turns)
    ? latestManifold.turns.slice()
    : [];
  const existingIndex = turns.findIndex((turn) => turn.turn_id === turnProjection.turn_id);
  if (existingIndex >= 0) {
    turns[existingIndex] = turnProjection;
  } else {
    turns.push(turnProjection);
  }
  turns.sort((left, right) => manifoldTurnStartSequence(left) - manifoldTurnStartSequence(right));
  latestManifold = {
    task_id: taskId,
    turns
  };
  return turnProjection;
}

function scheduleManifoldReplayRefresh() {
  if (manifoldReplayRefreshTimer) {
    return;
  }

  manifoldReplayRefreshTimer = window.setTimeout(async () => {
    manifoldReplayRefreshTimer = null;
    await refreshManifold();
  }, 120);
}

function applyManifoldUpdate(payload) {
  if (!payload || !payload.update) {
    scheduleManifoldReplayRefresh();
    return;
  }

  if (!latestManifold) {
    latestManifold = {
      task_id: payload.update.task_id,
      turns: []
    };
  }

  const mergedTurn = payload.turn ? mergeManifoldTurnProjection(payload.turn) : null;
  const currentTurnId = selectedTurnId;
  const shouldTailCurrentTurn =
    manifoldTailMode &&
    (!currentTurnId || currentTurnId === payload.update.turn_id);

  if (!currentTurnId && mergedTurn) {
    selectedTurnId = mergedTurn.turn_id;
  }

  if (shouldTailCurrentTurn && mergedTurn && Array.isArray(mergedTurn.frames) && mergedTurn.frames.length) {
    manifoldFrameIndex = mergedTurn.frames.length - 1;
    if (payload.frame && Array.isArray(payload.frame.active_signals)) {
      const matchingSignal = payload.frame.active_signals.find(
        (signal) => signal.snapshot_record_id === payload.update.record_id
      );
      if (matchingSignal) {
        selectedManifoldSourceRecordId = matchingSignal.snapshot_record_id;
      }
    }
  }

  if (activeTraceView === 'manifold') {
    renderManifoldShell();
  }

  scheduleManifoldReplayRefresh();
}

function selectedManifoldSignal(activeSignals) {
  if (!Array.isArray(activeSignals) || !activeSignals.length) {
    selectedManifoldSourceRecordId = null;
    return null;
  }

  const selectedSignal = activeSignals.find(
    (signal) => signal.snapshot_record_id === selectedManifoldSourceRecordId
  );
  if (selectedSignal) {
    return selectedSignal;
  }

  selectedManifoldSourceRecordId = activeSignals[activeSignals.length - 1].snapshot_record_id;
  return activeSignals[activeSignals.length - 1];
}

function selectManifoldSource(recordId) {
  selectedManifoldSourceRecordId = recordId || null;
  renderManifoldShell();
}

function openManifoldSourceInInspector(turnId, recordId) {
  if (!turnId || !recordId) {
    return;
  }
  selectedTurnId = turnId;
  selectedSelectionMode = 'record';
  selectedFocus = { kind: 'all', id: null };
  selectedRecordId = recordId;
  forensicTailMode = false;
  normalizeSelection();
  renderForensics();
  setTraceView('inspector');
}

function selectedManifoldFrameIndex(turn) {
  if (!turn || !Array.isArray(turn.frames) || !turn.frames.length) {
    return 0;
  }
  if (manifoldTailMode || manifoldFrameIndex == null) {
    return turn.frames.length - 1;
  }
  return Math.max(0, Math.min(turn.frames.length - 1, manifoldFrameIndex));
}

function currentManifoldFrame(turn) {
  const activeTurn = turn || currentManifoldTurn();
  if (!activeTurn || !Array.isArray(activeTurn.frames) || !activeTurn.frames.length) {
    return null;
  }
  return activeTurn.frames[selectedManifoldFrameIndex(activeTurn)] || activeTurn.frames[activeTurn.frames.length - 1];
}

function stopManifoldPlayback() {
  manifoldPlaybackActive = false;
  manifoldPlaybackLastTick = 0;
  if (manifoldPlaybackHandle != null) {
    window.cancelAnimationFrame(manifoldPlaybackHandle);
    manifoldPlaybackHandle = null;
  }
  const button = document.getElementById('manifold-play-toggle');
  if (button) {
    button.textContent = 'Play';
  }
}

function advanceManifoldPlayback(timestamp) {
  if (!manifoldPlaybackActive) {
    manifoldPlaybackHandle = null;
    return;
  }
  const turn = currentManifoldTurn();
  if (!turn || !turn.frames.length) {
    stopManifoldPlayback();
    return;
  }
  if (!manifoldPlaybackLastTick) {
    manifoldPlaybackLastTick = timestamp;
  }
  if (timestamp - manifoldPlaybackLastTick >= MANIFOLD_PLAYBACK_STEP_MS) {
    manifoldPlaybackLastTick = timestamp;
    const currentIndex = selectedManifoldFrameIndex(turn);
    if (currentIndex >= turn.frames.length - 1) {
      manifoldTailMode = true;
      manifoldFrameIndex = turn.frames.length - 1;
      stopManifoldPlayback();
      renderManifoldShell();
      return;
    }
    manifoldTailMode = false;
    manifoldFrameIndex = currentIndex + 1;
    renderManifoldShell();
  }
  manifoldPlaybackHandle = window.requestAnimationFrame(advanceManifoldPlayback);
}

function toggleManifoldPlayback() {
  const turn = currentManifoldTurn();
  if (!turn || !turn.frames.length) {
    stopManifoldPlayback();
    return;
  }
  if (manifoldPlaybackActive) {
    stopManifoldPlayback();
    return;
  }
  if (selectedManifoldFrameIndex(turn) >= turn.frames.length - 1) {
    manifoldTailMode = false;
    manifoldFrameIndex = 0;
    renderManifoldShell();
  }
  manifoldPlaybackActive = true;
  manifoldPlaybackLastTick = 0;
  const button = document.getElementById('manifold-play-toggle');
  if (button) {
    button.textContent = 'Pause';
  }
  manifoldPlaybackHandle = window.requestAnimationFrame(advanceManifoldPlayback);
}

function replayManifold() {
  const turn = currentManifoldTurn();
  if (!turn || !turn.frames.length) {
    return;
  }
  stopManifoldPlayback();
  manifoldTailMode = false;
  manifoldFrameIndex = 0;
  renderManifoldShell();
}

function primitiveForFrame(frame, primitiveId) {
  if (!frame || !Array.isArray(frame.primitives)) {
    return null;
  }
  return frame.primitives.find((primitive) => primitive.primitive_id === primitiveId) || null;
}

function primitivePhase(turn, frameIndex, primitive) {
  if (!turn || !primitive) {
    return 'stable';
  }
  const previousFrame = frameIndex > 0 ? turn.frames[frameIndex - 1] : null;
  const previousPrimitive = primitiveForFrame(previousFrame, primitive.primitive_id);
  const latestFrame = turn.frames[turn.frames.length - 1] || null;
  const latestPrimitive = primitiveForFrame(latestFrame, primitive.primitive_id);
  if (!previousPrimitive || (primitive.magnitude_percent || 0) > (previousPrimitive.magnitude_percent || 0)) {
    return 'accumulating';
  }
  if (frameIndex < turn.frames.length - 1 && latestPrimitive && latestPrimitive.evidence_record_id !== primitive.evidence_record_id) {
    return 'superseded';
  }
  if (frameIndex < turn.frames.length - 1 && !latestPrimitive) {
    return 'bleed_off';
  }
  return 'stable';
}

function syncManifoldControls(turn) {
  const scrubber = document.getElementById('manifold-time-scrubber');
  const frameMeta = document.getElementById('manifold-frame-meta');
  const playButton = document.getElementById('manifold-play-toggle');
  const replayButton = document.getElementById('manifold-replay-button');
  const frameCount = turn && Array.isArray(turn.frames) ? turn.frames.length : 0;
  const currentIndex = frameCount ? selectedManifoldFrameIndex(turn) : 0;

  scrubber.max = String(Math.max(0, frameCount - 1));
  scrubber.value = String(currentIndex);
  scrubber.disabled = frameCount <= 1;
  frameMeta.textContent = 'Frame ' + (frameCount ? currentIndex + 1 : 0) + ' / ' + frameCount;
  playButton.disabled = frameCount <= 1;
  replayButton.disabled = frameCount === 0;
  playButton.textContent = manifoldPlaybackActive ? 'Pause' : 'Play';
}

function renderManifoldShell() {
  const stageMeta = document.getElementById('manifold-stage-meta');
  const canvas = document.getElementById('manifold-canvas');
  const timelinePanel = document.getElementById('manifold-timeline-panel');
  const sourcePanel = document.getElementById('manifold-source-panel');
  const turns = manifoldTurns();
  const turn = currentManifoldTurn();
  const frame = currentManifoldFrame(turn);
  const frameIndex = turn ? selectedManifoldFrameIndex(turn) : 0;
  const activeSignals = frame && Array.isArray(frame.active_signals) ? frame.active_signals : [];
  const primitives = frame && Array.isArray(frame.primitives) ? frame.primitives : [];
  const conduits = frame && Array.isArray(frame.conduits) ? frame.conduits : [];
  const totalFrames = turns.reduce((sum, item) => sum + (Array.isArray(item.frames) ? item.frames.length : 0), 0);
  const currentLifecycle = frame ? frame.lifecycle : (turn ? turn.lifecycle : 'provisional');
  const selectedSignal = selectedManifoldSignal(activeSignals);
  syncManifoldControls(turn);

  if (!turns.length) {
    stageMeta.textContent = 'Awaiting replay-backed manifold frames';
    canvas.innerHTML =
      '<div class="manifold-empty-state">' +
        '<strong>Steering signal manifold route is armed.</strong>' +
        '<p>This route keeps the systemic manifold separate from the precise forensic inspector. Once replay-backed steering snapshots arrive, the chamber canvas, timeline, and source panes will populate here.</p>' +
      '</div>';
    timelinePanel.innerHTML =
      '<div class="manifold-panel-title">Timeline</div>' +
      '<div class="manifold-panel-copy">Replay-backed turn frames will accumulate here without creating page-level overflow.</div>';
    sourcePanel.innerHTML =
      '<div class="manifold-panel-title">Sources</div>' +
      '<div class="manifold-panel-copy">Active steering signal anchors and contributions will appear here after the first replay-backed manifold frame arrives.</div>';
    return;
  }

  stageMeta.innerHTML =
    escapeHtml(latestManifold.task_id || 'task') + ' · ' +
    escapeHtml(String(turns.length)) + ' turns · ' +
    escapeHtml(String(totalFrames)) + ' frames · ' +
    'selected ' + escapeHtml(String(frameIndex + 1)) + ' ' +
    manifoldLifecycleBadge(currentLifecycle, 'manifold-panel-status');

  canvas.innerHTML =
    '<div class="manifold-machine">' +
      '<div class="manifold-empty-state">' +
        '<strong>Temporal manifold playback is active.</strong>' +
        '<p>The manifold stage now scrubs through replay frames. Fill tracks accumulation, dashed topology indicates supersession, and historical frames can fade as the route moves through stabilization and bleed-off.</p>' +
        '<p><strong>Current turn:</strong> ' + escapeHtml(turn ? turn.turn_id : 'none') + '<br>' +
        '<strong>Latest frame:</strong> ' + escapeHtml(frame ? String(frame.sequence) : 'none') + '<br>' +
        '<strong>Primitives:</strong> ' + primitives.length + ' · <strong>Conduits:</strong> ' + conduits.length + '</p>' +
      '</div>' +
      '<div class="manifold-machine-grid">' +
        (primitives.length
          ? primitives.map((primitive) => {
              const phase = primitivePhase(turn, frameIndex, primitive);
              const selectedClass = primitive.evidence_record_id && primitive.evidence_record_id === selectedManifoldSourceRecordId
                ? ' is-selected'
                : '';
              return (
              '<button class="manifold-node' + selectedClass + '" data-phase="' + escapeHtml(phase) + '" data-lifecycle="' + escapeHtml(manifoldLifecycleClass(currentLifecycle)) + '" data-source-record-id="' + escapeHtml(primitive.evidence_record_id || '') + '">' +
                '<div class="manifold-node__eyebrow"><span>' + escapeHtml(manifoldPrimitiveKindLabel(primitive.kind) + ' · ' + phase.replace('_', ' ')) + '</span>' + manifoldLifecycleBadge(currentLifecycle) + '</div>' +
                '<div class="manifold-node__title">' + escapeHtml(primitive.label || primitive.primitive_id) + '</div>' +
                '<div class="manifold-node__meta">' +
                  'magnitude ' + escapeHtml(String(primitive.magnitude_percent || 0)) + '% · ' +
                  escapeHtml(primitive.level || 'unknown') +
                '</div>' +
                '<div class="manifold-node__fill"><span style="width:' + escapeHtml(String(Math.max(0, Math.min(100, primitive.magnitude_percent || 0)))) + '%"></span></div>' +
                '<div class="manifold-node__basis">' + escapeHtml(manifoldPrimitiveBasisLabel(primitive.basis)) + '</div>' +
              '</button>'
            );}).join('')
          : '<div class="manifold-empty-state"><strong>No primitives yet.</strong><p>This frame has signal state but no projected topology.</p></div>') +
      '</div>' +
      '<div class="manifold-conduit-strip">' +
        (conduits.length
          ? conduits.map((conduit) => {
              const targetPrimitive = primitives.find((primitive) => primitive.primitive_id === conduit.to_primitive_id) || null;
              const phase = targetPrimitive ? primitivePhase(turn, frameIndex, targetPrimitive) : 'stable';
              const selectedClass = conduit.evidence_record_id && conduit.evidence_record_id === selectedManifoldSourceRecordId
                ? ' is-selected'
                : '';
              return (
              '<button class="manifold-conduit' + selectedClass + '" data-phase="' + escapeHtml(phase) + '" data-lifecycle="' + escapeHtml(manifoldLifecycleClass(currentLifecycle)) + '" data-source-record-id="' + escapeHtml(conduit.evidence_record_id || '') + '">' +
                '<strong>' + escapeHtml(conduit.label || conduit.conduit_id) + '</strong>' +
                '<span>' + escapeHtml(conduit.from_primitive_id) + ' → ' + escapeHtml(conduit.to_primitive_id) + '</span>' +
              '</button>'
            );}).join('')
          : '<div class="manifold-panel-copy">No conduits were active in the selected frame.</div>') +
      '</div>' +
    '</div>';

  timelinePanel.innerHTML =
    '<div class="manifold-panel-title">Timeline</div>' +
    '<div class="manifold-panel-copy">Replay-backed frames stay bounded to this pane so long conversations scroll locally instead of expanding the page. Selecting a turn retargets the scrubber without replacing the whole route.</div>' +
    '<div class="manifold-panel-list">' +
      turns.slice().reverse().map((turnItem) => {
        const latestFrame = turnItem.frames && turnItem.frames.length ? turnItem.frames[turnItem.frames.length - 1] : null;
        return (
          '<button class="manifold-panel-button" data-manifold-turn-id="' + escapeHtml(turnItem.turn_id) + '" data-lifecycle="' + escapeHtml(manifoldLifecycleClass(turnItem.lifecycle)) + '">' +
            '<div class="manifold-panel-row">' +
              '<strong>' + escapeHtml(truncate(turnItem.turn_id, 28)) + '</strong>' +
              '<span>' + escapeHtml(String((turnItem.frames || []).length)) + ' frames' +
              (latestFrame ? ' · step ' + escapeHtml(String(latestFrame.sequence)) : '') +
              '</span>' +
            '</div>' +
            manifoldLifecycleBadge(turnItem.lifecycle, 'manifold-panel-status') +
          '</button>'
        );
      }).join('') +
    '</div>';

  sourcePanel.innerHTML =
    '<div class="manifold-panel-title">Sources</div>' +
    '<div class="manifold-panel-copy">Current turn anchor: <strong>' + escapeHtml(manifoldAnchorLabel(frame ? frame.anchor : null)) + '</strong> · frame state ' + manifoldLifecycleBadge(currentLifecycle, 'manifold-panel-status') + '</div>' +
    (selectedSignal
      ? '<div class="manifold-source-detail">' +
          '<div class="manifold-source-detail__head">' +
            '<div>' +
              '<div class="manifold-source-detail__title">' + escapeHtml(selectedSignal.summary || manifoldSignalLabel(selectedSignal)) + '</div>' +
              '<div class="manifold-source-detail__meta">' +
                escapeHtml(manifoldSignalLabel(selectedSignal)) +
                ' · record ' + escapeHtml(selectedSignal.snapshot_record_id) +
                ' · anchor ' + escapeHtml(manifoldAnchorLabel(selectedSignal.anchor)) +
              '</div>' +
            '</div>' +
            manifoldLifecycleBadge(selectedSignal.lifecycle, 'manifold-panel-status') +
          '</div>' +
          '<div class="manifold-source-detail__body">' +
            escapeHtml(
              truncate(
                artifactText(selectedSignal.artifact) || selectedSignal.summary || 'No inline source payload recorded.',
                420
              )
            ) +
          '</div>' +
          '<div class="manifold-source-detail__meta">' +
            (selectedSignal.contributions || []).map((contribution) =>
              sourceLabel(contribution.source) + ' ' + (contribution.share_percent || 0) + '%'
            ).join(' · ') +
          '</div>' +
          '<div class="manifold-source-detail__actions">' +
            '<button class="manifold-source-detail__button" type="button" data-open-forensic-turn-id="' + escapeHtml(turn ? turn.turn_id : '') + '" data-open-forensic-record-id="' + escapeHtml(selectedSignal.snapshot_record_id) + '">Open exact forensic record</button>' +
          '</div>' +
        '</div>'
      : '<div class="manifold-panel-copy">Select a chamber or conduit to inspect the exact trace record behind that manifold state.</div>') +
    '<div class="manifold-panel-list">' +
      (activeSignals.length
        ? activeSignals.map((signal) => (
            '<button class="manifold-panel-button' + (signal.snapshot_record_id === selectedManifoldSourceRecordId ? ' is-selected' : '') + '" type="button" data-source-record-id="' + escapeHtml(signal.snapshot_record_id) + '">' +
              '<div class="manifold-panel-row">' +
                '<strong>' + escapeHtml(signal.summary || manifoldSignalLabel(signal)) + '</strong>' +
                '<span>' +
                  escapeHtml(manifoldSignalLabel(signal)) +
                  ' · ' +
                  escapeHtml((signal.magnitude_percent || 0) + '%') +
                '</span>' +
              '</div>' +
              manifoldLifecycleBadge(signal.lifecycle, 'manifold-panel-status') +
            '</button>'
          )).join('')
        : '<div class="manifold-panel-copy">No active steering signals were present in the current frame.</div>') +
    '</div>';

  timelinePanel.querySelectorAll('[data-manifold-turn-id]').forEach((button) => {
    button.addEventListener('click', () => {
      stopManifoldPlayback();
      selectedTurnId = button.dataset.manifoldTurnId;
      manifoldTailMode = true;
      manifoldFrameIndex = null;
      selectedManifoldSourceRecordId = null;
      renderManifoldShell();
    });
  });
  canvas.querySelectorAll('[data-source-record-id]').forEach((button) => {
    button.addEventListener('click', () => {
      if (!button.dataset.sourceRecordId) {
        return;
      }
      selectManifoldSource(button.dataset.sourceRecordId);
    });
  });
  sourcePanel.querySelectorAll('[data-source-record-id]').forEach((button) => {
    button.addEventListener('click', () => {
      selectManifoldSource(button.dataset.sourceRecordId);
    });
  });
  sourcePanel.querySelectorAll('[data-open-forensic-record-id]').forEach((button) => {
    button.addEventListener('click', () => {
      openManifoldSourceInInspector(
        button.dataset.openForensicTurnId,
        button.dataset.openForensicRecordId
      );
    });
  });
}

function clampTraceZoom(value) {
  return Math.max(TRACE_ZOOM_MIN, Math.min(TRACE_ZOOM_MAX, value));
}

function traceNodeFamily(kind) {
  return TRACE_KIND_FAMILY[kind] || 'significant';
}

function traceNodeVisible(node) {
  if (traceScopeMode === 'full') {
    return true;
  }
  if (TRACE_SIGNIFICANT_KINDS.has(node.kind)) {
    return true;
  }
  return !!traceFamilyVisibility[traceNodeFamily(node.kind)];
}

function traceDetailLevelForZoom(zoom) {
  if (zoom <= 0.68) {
    return 'overview';
  }
  if (zoom <= 1.14) {
    return 'balanced';
  }
  return 'focus';
}

function traceLayoutForZoom(zoom) {
  const detailLevel = traceDetailLevelForZoom(zoom);
  const zoomCurve = Math.pow(zoom, 0.82);
  const tileMultiplier = detailLevel === 'overview'
    ? 0.84
    : detailLevel === 'balanced'
      ? 0.96
      : 1.14;
  const columnGap = TRACE_TILE_GAP * (
    detailLevel === 'overview'
      ? 0.84
      : detailLevel === 'balanced'
        ? 1
        : 1.2
  ) * Math.max(0.78, zoom * 0.9);
  const rowGap = TRACE_TILE_GAP * (
    detailLevel === 'overview'
      ? 0.94
      : detailLevel === 'balanced'
        ? 1.08
        : 1.28
  ) * Math.max(0.8, zoom * 0.92);
  return {
    detailLevel,
    tileMin: TRACE_TILE_MIN * zoomCurve * tileMultiplier,
    columnGap,
    rowGap
  };
}

function syncTransitTraceControls(visibleCount = null, totalCount = null, detailLevel = null) {
  document.querySelectorAll('[data-trace-scope]').forEach((button) => {
    button.classList.toggle('is-active', button.dataset.traceScope === traceScopeMode);
  });
  document.querySelectorAll('[data-trace-family]').forEach((button) => {
    button.classList.toggle('is-active', !!traceFamilyVisibility[button.dataset.traceFamily]);
  });
  const meta = document.getElementById('trace-transit-meta');
  if (!meta) {
    return;
  }
  const detail = detailLevel || traceDetailLevelForZoom(traceZoom);
  const scopeLabel = traceScopeMode === 'full' ? 'full trace' : 'significant steps';
  if (visibleCount == null || totalCount == null) {
    meta.textContent = 'Showing ' + scopeLabel + ' · ' + (TRACE_DETAIL_LEVEL_LABELS[detail] || detail);
    return;
  }
  meta.textContent =
    'Showing ' + visibleCount + ' of ' + totalCount + ' steps · ' +
    scopeLabel + ' · ' +
    (TRACE_DETAIL_LEVEL_LABELS[detail] || detail);
}

function applyTracePanTransform(board) {
  if (!board) {
    return;
  }

  board.style.setProperty('--trace-pan-x', tracePanX.toFixed(2) + 'px');
  board.style.setProperty('--trace-pan-y', tracePanY.toFixed(2) + 'px');
}

function resetTraceViewTransform(board) {
  tracePanX = 0;
  tracePanY = 0;
  applyTracePanTransform(board);
}

function applyTraceZoom(board, nextZoom, anchorClientX = null, anchorClientY = null) {
  if (!board) {
    return;
  }

  const canvas = board.querySelector('.trace-canvas');
  const rect = board.getBoundingClientRect();
  const focusX = anchorClientX == null
    ? board.clientWidth / 2
    : Math.max(0, Math.min(board.clientWidth, anchorClientX - rect.left));
  const focusY = anchorClientY == null
    ? board.clientHeight / 2
    : Math.max(0, Math.min(board.clientHeight, anchorClientY - rect.top));
  const canvasWidth = canvas ? Math.max(canvas.scrollWidth, canvas.offsetWidth, 1) : Math.max(board.clientWidth, 1);
  const canvasHeight = canvas ? Math.max(canvas.scrollHeight, canvas.offsetHeight, 1) : Math.max(board.clientHeight, 1);
  const ratioX = Math.max(0, Math.min(1, (focusX - tracePanX) / canvasWidth));
  const ratioY = Math.max(0, Math.min(1, (focusY - tracePanY) / canvasHeight));

  traceZoom = clampTraceZoom(nextZoom);
  board.style.setProperty('--trace-scale', traceZoom.toFixed(3));

  if (latestTraceGraph && latestTraceGraph.nodes && latestTraceGraph.nodes.length) {
    renderTraceDAG(latestTraceGraph);
    requestAnimationFrame(() => {
      const nextCanvas = board.querySelector('.trace-canvas');
      const nextWidth = nextCanvas ? Math.max(nextCanvas.scrollWidth, nextCanvas.offsetWidth, 1) : Math.max(board.clientWidth, 1);
      const nextHeight = nextCanvas ? Math.max(nextCanvas.scrollHeight, nextCanvas.offsetHeight, 1) : Math.max(board.clientHeight, 1);
      tracePanX = focusX - ratioX * nextWidth;
      tracePanY = focusY - ratioY * nextHeight;
      applyTracePanTransform(board);
    });
  }
}

function bindTraceZoom(board) {
  if (!board || board.dataset.zoomBound === 'true') {
    return;
  }

  board.dataset.zoomBound = 'true';
  board.style.setProperty('--trace-scale', traceZoom.toFixed(3));
  board.addEventListener('wheel', (event) => {
    if (!latestTraceGraph || !latestTraceGraph.nodes || !latestTraceGraph.nodes.length) {
      return;
    }

    const nextZoom = clampTraceZoom(traceZoom * Math.exp(-event.deltaY * 0.0015));
    if (Math.abs(nextZoom - traceZoom) < 0.001) {
      return;
    }

    event.preventDefault();
    applyTraceZoom(board, nextZoom, event.clientX, event.clientY);
  }, { passive: false });
}

function endTracePan() {
  if (!tracePanState) {
    return;
  }

  const { board, dragging } = tracePanState;
  tracePanState = null;
  board.classList.remove('is-panning');
  if (dragging) {
    window.setTimeout(() => {
      delete board.dataset.panSuppressClick;
    }, 0);
  }
}

function bindTracePan(board) {
  if (!board || board.dataset.panBound === 'true') {
    return;
  }

  board.dataset.panBound = 'true';
  applyTracePanTransform(board);
  board.addEventListener('mousedown', (event) => {
    if (event.button !== 0) {
      return;
    }

    tracePanState = {
      board,
      startX: event.clientX,
      startY: event.clientY,
      startPanX: tracePanX,
      startPanY: tracePanY,
      dragging: false
    };
  });

  window.addEventListener('mousemove', (event) => {
    if (!tracePanState || tracePanState.board !== board) {
      return;
    }

    const deltaX = event.clientX - tracePanState.startX;
    const deltaY = event.clientY - tracePanState.startY;
    if (!tracePanState.dragging && Math.abs(deltaX) + Math.abs(deltaY) < 4) {
      return;
    }

    if (!tracePanState.dragging) {
      tracePanState.dragging = true;
      board.classList.add('is-panning');
      board.dataset.panSuppressClick = 'true';
    }

    tracePanX = tracePanState.startPanX + deltaX;
    tracePanY = tracePanState.startPanY + deltaY;
    applyTracePanTransform(board);
  });

  window.addEventListener('mouseup', (event) => {
    if (event.button !== 0) {
      return;
    }
    endTracePan();
  });

  window.addEventListener('blur', endTracePan);

  board.addEventListener('mouseleave', () => {
    if (!tracePanState || !tracePanState.dragging) {
      return;
    }
    board.classList.add('is-panning');
  });

  board.addEventListener('click', (event) => {
    if (board.dataset.panSuppressClick === 'true') {
      event.preventDefault();
      event.stopPropagation();
    }
  }, true);
}

function scheduleForensicRefresh(options = {}) {
  const next = {
    preserveSelection: true,
    preferProvisionalTurnId: null,
    preferProvisionalRecordId: null,
    ...options
  };

  if (pendingForensicRefresh) {
    pendingForensicRefresh = {
      ...pendingForensicRefresh,
      ...next,
      preferProvisionalTurnId: next.preferProvisionalTurnId || pendingForensicRefresh.preferProvisionalTurnId,
      preferProvisionalRecordId: next.preferProvisionalRecordId || pendingForensicRefresh.preferProvisionalRecordId
    };
  } else {
    pendingForensicRefresh = next;
  }

  if (forensicRefreshTimer) {
    return;
  }

  forensicRefreshTimer = window.setTimeout(async () => {
    const refreshOptions = pendingForensicRefresh || { preserveSelection: true };
    pendingForensicRefresh = null;
    forensicRefreshTimer = null;
    await refreshForensics(refreshOptions);
    await refreshManifold();
    refreshTraceGraph();
  }, 40);
}

function connectSSE() {
  if (eventSource) eventSource.close();
  if (transcriptEventSource) transcriptEventSource.close();
  if (forensicEventSource) forensicEventSource.close();
  if (manifoldEventSource) manifoldEventSource.close();

  eventSource = new EventSource('/events');
  eventSource.addEventListener('turn_event', (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  });

  transcriptEventSource = new EventSource('/sessions/' + sessionId + '/transcript/events');
  transcriptEventSource.addEventListener('transcript_update', async () => {
    await refreshConversationTranscript({ reset: true, only_if_changed: true });
    await refreshForensics({ preserveSelection: true });
    await refreshManifold();
    refreshTraceGraph();
  });

  forensicEventSource = new EventSource('/sessions/' + sessionId + '/forensics/events');
  forensicEventSource.addEventListener('forensic_update', (e) => {
    const payload = JSON.parse(e.data);
    scheduleForensicRefresh({
      preserveSelection: true,
      preferProvisionalTurnId: payload && payload.update ? payload.update.turn_id : null,
      preferProvisionalRecordId: payload && payload.record && payload.record.record ? payload.record.record.record_id : null
    });
  });

  manifoldEventSource = new EventSource('/sessions/' + sessionId + '/manifold/events');
  manifoldEventSource.addEventListener('manifold_update', (e) => {
    const payload = JSON.parse(e.data);
    applyManifoldUpdate(payload);
  });
}

function addMessage(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  const messages = document.getElementById('messages');
  const group = messages.querySelector('.events-group');
  if (group) {
    messages.insertBefore(el, group);
  } else {
    messages.appendChild(el);
  }
  el.scrollIntoView({ behavior: 'smooth' });
}

function clearTranscriptMessages() {
  const messages = document.getElementById('messages');
  for (const node of Array.from(messages.querySelectorAll('.msg'))) {
    node.remove();
  }
}

function transcriptSignatureForConversation(transcript) {
  const last = transcript.entries.length ? transcript.entries[transcript.entries.length - 1] : null;
  const lastId = last ? last.record_id : 'none';
  return transcript.task_id + ':' + transcript.entries.length + ':' + lastId;
}

function eventGroup() {
  let group = document.getElementById('messages').lastElementChild;
  if (!group || !group.classList.contains('events-group')) {
    group = document.createElement('div');
    group.className = 'events-group';
    document.getElementById('messages').appendChild(group);
  }
  return group;
}

function addEventRow(badge, badgeCls, text, htmlContent = null, options = {}) {
  const { key = null, replace = false } = options;
  const group = eventGroup();
  if (key) {
    const existing = group.querySelector('[data-event-key="' + key + '"]');
    if (existing) {
      const content = htmlContent === null ? escapeHtml(text) : htmlContent;
      existing.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + content + '</span>';
      existing.dataset.eventText = text;
      existing.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }
  }
  if (replace && group.lastElementChild && group.lastElementChild.classList.contains('event-row')) {
    group.lastElementChild.remove();
  }
  const row = document.createElement('div');
  row.className = 'event-row';
  const content = htmlContent === null ? escapeHtml(text) : htmlContent;
  row.innerHTML = '<span class="event-badge ' + badgeCls + '">' + badge + '</span><span>' + content + '</span>';
  if (key) {
    row.dataset.eventKey = key;
  }
  row.dataset.eventText = text;
  group.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function formatDuration(totalSeconds) {
  const seconds = Number(totalSeconds);
  if (!Number.isFinite(seconds) || seconds <= 0) {
    return '0s';
  }
  const s = Math.floor(seconds % 60);
  const m = Math.floor((seconds / 60) % 60);
  const h = Math.floor(seconds / 3600);
  if (h > 0) {
    return `${h}h ${m}m ${s}s`;
  }
  if (m > 0) {
    return `${m}m ${s}s`;
  }
  return `${s}s`;
}

function isMutationTool(toolName) {
  return MUTATION_TOOLS.has(toolName);
}

function extractMutationDiff(toolName, summary) {
  if (!summary) {
    return null;
  }
  if (toolName === 'diff') {
    if (summary === 'No diff output.') {
      return summary;
    }
    if (summary.startsWith('Diff output:\n')) {
      return summary.slice('Diff output:\n'.length);
    }
    if (summary.startsWith('Diff output:\r\n')) {
      return summary.slice('Diff output:\r\n'.length);
    }
    return null;
  }
  if (toolName === 'apply_patch') {
    if (!summary.startsWith('Applied patch:\n')) {
      return null;
    }
    const body = summary.slice('Applied patch:\n'.length);
    return body.split('\n\nExit status:')[0].split('\nExit status:')[0].trim();
  }
  return null;
}

function diffLineClass(line) {
  if (
    line.startsWith('+++') ||
    line.startsWith('---') ||
    line.startsWith('diff ') ||
    line.startsWith('index ')
  ) {
    return 'meta';
  }
  if (line.startsWith('+')) {
    return 'add';
  }
  if (line.startsWith('-')) {
    return 'remove';
  }
  if (line.startsWith('@@')) {
    return 'hunk';
  }
  if (line.startsWith('\\')) {
    return 'noop';
  }
  return 'context';
}

function formatDiffForEvent(toolName, diff) {
  const lines = diff
    .split('\n')
    .map((line) => '<span class="diff-line ' + diffLineClass(line) + '">' + escapeHtml(line) + '</span>')
    .join('<br>');
  return escapeHtml(toolName + ' done') + '<br><span class="diff-lines">' + lines + '</span>';
}

function handleEvent(ev) {
  const t = ev.type;
  if (t === 'intent_classified') {
    addEventRow('route', 'route', 'Intent: ' + ev.intent);
  } else if (t === 'interpretation_context') {
    addEventRow('context', 'route', ev.summary);
  } else if (t === 'planner_action_selected') {
    addEventRow('planner', 'planner', 'Step ' + ev.sequence + ': ' + ev.action);
  } else if (t === 'tool_called') {
    addEventRow('tool', 'tool', ev.tool_name + ': ' + truncate(ev.invocation, 60));
  } else if (t === 'tool_finished') {
    if (isMutationTool(ev.tool_name)) {
      const diff = extractMutationDiff(ev.tool_name, ev.summary);
      if (diff) {
        addEventRow('tool', 'tool-diff', ev.tool_name + ' done', formatDiffForEvent(ev.tool_name, diff));
      } else {
        addEventRow('tool', 'tool', ev.tool_name + ' done');
      }
    } else {
      addEventRow('tool', 'tool', ev.tool_name + ' done');
    }
  } else if (t === 'gatherer_summary') {
    addEventRow('gather', 'gatherer', ev.summary);
  } else if (t === 'gatherer_search_progress') {
    const eta = ev.eta_seconds == null ? 'unknown' : formatDuration(ev.eta_seconds);
    const strategy = ev.strategy ? ' strategy=' + ev.strategy : '';
    const details = ev.detail ? ' · ' + ev.detail : '';
    addEventRow('gather', 'gatherer', 'searching (' + ev.phase + ')' + strategy + ' · eta ' + eta + details, null, { key: 'gather-progress' });
  } else if (t === 'planner_summary') {
    addEventRow('planner', 'planner', ev.strategy + ' ' + ev.mode + ' (' + ev.steps + ' steps)');
  } else if (t === 'synthesis_ready') {
    addEventRow('synth', ev.insufficient_evidence ? 'fallback' : 'synthesis', ev.insufficient_evidence ? 'Insufficient evidence' : (ev.grounded ? 'Grounded' : 'Direct'));
  } else if (t === 'route_selected') {
    addEventRow('route', 'route', truncate(ev.summary, 80));
  } else if (t === 'fallback') {
    addEventRow('fallback', 'fallback', ev.stage + ': ' + ev.reason);
  } else if (t === 'planner_capability' || t === 'gatherer_capability') {
    addEventRow('cap', 'route', ev.provider + ': ' + ev.capability);
  } else if (t === 'thread_merged') {
    addEventRow('merge', 'planner', ev.source_thread + ' -> ' + ev.target_thread);
  }
  refreshTraceGraph();
}

function kindEntry(recordProjection) {
  const kind = (recordProjection && recordProjection.record && recordProjection.record.kind) || {};
  const key = Object.keys(kind)[0] || 'Unknown';
  return { key, value: kind[key] || {} };
}

function kindLabel(key) {
  return FORENSIC_KIND_LABELS[key] || key.replace(/([a-z0-9])([A-Z])/g, '$1 $2').replace(/_/g, ' ').toLowerCase();
}

function lifecycleLabel(lifecycle) {
  return lifecycle ? String(lifecycle).replace(/_/g, ' ') : 'unknown';
}

function lifecycleClass(lifecycle) {
  return lifecycle ? String(lifecycle) : 'final';
}

function lifecycleBadge(lifecycle) {
  return '<span class="forensic-lifecycle is-' + lifecycleClass(lifecycle) + '">' + escapeHtml(lifecycleLabel(lifecycle)) + '</span>';
}

function projectionTurns() {
  return latestForensics && Array.isArray(latestForensics.turns) ? latestForensics.turns : [];
}

function manifoldTurns() {
  return latestManifold && Array.isArray(latestManifold.turns) ? latestManifold.turns : [];
}

function currentTurn() {
  const turns = projectionTurns();
  if (!turns.length) {
    return null;
  }
  return turns.find((turn) => turn.turn_id === selectedTurnId) || turns[turns.length - 1];
}

function currentManifoldTurn() {
  const turns = manifoldTurns();
  if (!turns.length) {
    return null;
  }
  return turns.find((turn) => turn.turn_id === selectedTurnId) || turns[turns.length - 1];
}

function selectionScopeTurns() {
  if (selectedSelectionMode === 'conversation') {
    return projectionTurns();
  }
  const turn = currentTurn();
  return turn ? [turn] : [];
}

function findTurnRecord(turn, recordId) {
  if (!turn || !recordId) return null;
  return turn.records.find((recordProjection) => recordProjection.record.record_id === recordId) || null;
}

function artifactIdForRecord(recordProjection) {
  const artifact = primaryArtifact(recordProjection);
  return artifact && artifact.artifact_id ? artifact.artifact_id : null;
}

function selectedComparisonRecord(turn) {
  const selected = currentRecord();
  if (selected) {
    return selected;
  }
  const records = turn ? recordsForTurn(turn) : [];
  for (let index = records.length - 1; index >= 0; index -= 1) {
    if (primaryArtifact(records[index])) {
      return records[index];
    }
  }
  return records.length ? records[records.length - 1] : null;
}

function previousArtifactBaseline(turn, recordProjection) {
  if (!turn || !recordProjection) {
    return null;
  }

  const currentArtifactId = artifactIdForRecord(recordProjection);
  const entry = kindEntry(recordProjection);
  if (entry.key === 'ModelExchangeArtifact' && entry.value.parent_artifact_id) {
    for (let index = turn.records.length - 1; index >= 0; index -= 1) {
      const candidate = turn.records[index];
      if (candidate.record.sequence >= recordProjection.record.sequence) {
        continue;
      }
      if (artifactIdForRecord(candidate) === entry.value.parent_artifact_id) {
        return candidate;
      }
    }
  }

  let parentRecordId = recordProjection.record.lineage.parent_record_id;
  while (parentRecordId) {
    const parent = findTurnRecord(turn, parentRecordId);
    if (!parent) {
      break;
    }
    if (primaryArtifact(parent)) {
      return parent;
    }
    parentRecordId = parent.record.lineage.parent_record_id;
  }

  const scopedRecords = recordsForTurn(turn);
  for (let index = scopedRecords.length - 1; index >= 0; index -= 1) {
    const candidate = scopedRecords[index];
    if (candidate.record.sequence >= recordProjection.record.sequence) {
      continue;
    }
    const artifactId = artifactIdForRecord(candidate);
    if (artifactId && artifactId !== currentArtifactId) {
      return candidate;
    }
  }

  return null;
}

function strongestSignalSnapshot(forceRecords) {
  if (!forceRecords.length) {
    return null;
  }
  return forceRecords.reduce((best, candidate) => {
    const currentMagnitude = kindEntry(candidate).value.magnitude_percent || 0;
    const bestMagnitude = kindEntry(best).value.magnitude_percent || 0;
    return currentMagnitude > bestMagnitude ? candidate : best;
  });
}

function aggregateSignalContributions(forceRecords) {
  const totals = new Map();
  let totalShare = 0;

  forceRecords.forEach((recordProjection) => {
    const entry = kindEntry(recordProjection);
    (entry.value.contributions || []).forEach((contribution) => {
      const key = contribution.source || 'context';
      const bucket = totals.get(key) || {
        source: key,
        share: 0,
        rationales: new Set()
      };
      bucket.share += contribution.share_percent || 0;
      if (contribution.rationale) {
        bucket.rationales.add(contribution.rationale);
      }
      totals.set(key, bucket);
      totalShare += contribution.share_percent || 0;
    });
  });

  const items = Array.from(totals.values())
    .sort((left, right) => right.share - left.share)
    .map((bucket) => ({
      source: bucket.source,
      label: sourceLabel(bucket.source),
      color: sourceColor(bucket.source),
      share: bucket.share,
      percent: 0,
      rationale: Array.from(bucket.rationales)[0] || ''
    }));

  if (!items.length) {
    return [];
  }

  const denominator = totalShare || items.reduce((sum, item) => sum + item.share, 0) || 1;
  let assigned = 0;
  items.forEach((item, index) => {
    const percent = index + 1 === items.length
      ? Math.max(0, 100 - assigned)
      : Math.round((item.share / denominator) * 100);
    item.percent = percent;
    assigned += percent;
  });

  return items;
}

function signalSnapshotsForTurn(turn, recordProjection) {
  if (!turn) {
    return [];
  }
  const forceRecords = turn.records.filter((candidate) => kindEntry(candidate).key === 'SignalSnapshot');
  if (!forceRecords.length) {
    return [];
  }

  const relevantIds = new Set();
  if (selectedFocus.kind === 'model_call' && selectedFocus.id) {
    relevantIds.add('model-call:' + selectedFocus.id);
  } else if (selectedFocus.kind === 'planner_step' && selectedFocus.id) {
    relevantIds.add(selectedFocus.id);
  }
  if (recordProjection) {
    nodeIdsForRecord(recordProjection).forEach((id) => relevantIds.add(id));
  }

  if (!relevantIds.size) {
    return forceRecords;
  }

  const scoped = forceRecords.filter((candidate) => {
    const appliesTo = kindEntry(candidate).value.applies_to;
    return appliesTo && relevantIds.has(appliesTo.id);
  });

  return scoped.length ? scoped : forceRecords;
}

function signalSnapshotsForSelection() {
  const comparisonRecord = currentTurn() ? selectedComparisonRecord(currentTurn()) : null;
  return selectionScopeTurns().reduce((allSnapshots, turn) => {
    const turnComparisonRecord =
      comparisonRecord && turn.turn_id === comparisonRecord.record.lineage.turn_id
        ? comparisonRecord
        : null;
    return allSnapshots.concat(signalSnapshotsForTurn(turn, turnComparisonRecord));
  }, []);
}

function comparisonSnippet(recordProjection) {
  if (!recordProjection) {
    return 'No lineage artifact available.';
  }
  const body = selectedDetailMode === 'raw'
    ? rawRecordBody(recordProjection)
    : renderedRecordBody(recordProjection);
  return truncate((body || 'No payload body recorded.').replace(/\s+/g, ' ').trim(), 180);
}

function formatDelta(value) {
  if (!Number.isFinite(value) || value === 0) {
    return '0';
  }
  return value > 0 ? '+' + value : String(value);
}

function plannerStepsForTurn(turn) {
  if (!turn) return [];
  return turn.records
    .filter((recordProjection) => kindEntry(recordProjection).key === 'PlannerAction')
    .map((recordProjection) => {
      const entry = kindEntry(recordProjection);
      return {
        id: 'planner-step:' + recordProjection.record.record_id,
        recordId: recordProjection.record.record_id,
        label: truncate(entry.value.action || 'planner step', 44)
      };
    });
}

function modelCallsForTurn(turn) {
  if (!turn) return [];
  const grouped = new Map();
  for (const recordProjection of turn.records) {
    const entry = kindEntry(recordProjection);
    if (entry.key !== 'ModelExchangeArtifact') {
      continue;
    }
    const exchangeId = entry.value.exchange_id;
    if (!grouped.has(exchangeId)) {
      grouped.set(exchangeId, {
        id: exchangeId,
        lane: entry.value.lane,
        category: entry.value.category,
        provider: entry.value.provider,
        model: entry.value.model,
        summary: entry.value.artifact && entry.value.artifact.summary ? entry.value.artifact.summary : 'model call',
        phases: []
      });
    }
    grouped.get(exchangeId).phases.push(entry.value.phase);
  }
  return Array.from(grouped.values());
}

function focusMatchesTurn(turn, focus) {
  if (!turn) return false;
  if (!focus || focus.kind === 'all') return true;
  if (focus.kind === 'model_call') {
    return modelCallsForTurn(turn).some((item) => item.id === focus.id);
  }
  if (focus.kind === 'planner_step') {
    return plannerStepsForTurn(turn).some((item) => item.id === focus.id);
  }
  return false;
}

function nodeIdsForRecord(recordProjection) {
  const ids = new Set();
  const entry = kindEntry(recordProjection);
  if (entry.key === 'ModelExchangeArtifact') {
    ids.add('model-call:' + entry.value.exchange_id);
    if (entry.value.artifact && entry.value.artifact.artifact_id) {
      ids.add('artifact:' + entry.value.artifact.artifact_id);
    }
  } else if (entry.key === 'PlannerAction') {
    ids.add('planner-step:' + recordProjection.record.record_id);
  } else if (entry.key === 'CompletionCheckpoint' && entry.value.response && entry.value.response.artifact_id) {
    ids.add('output:' + entry.value.response.artifact_id);
  } else if (entry.key === 'SignalSnapshot') {
    ids.add('signal:' + recordProjection.record.record_id);
    if (entry.value.applies_to && entry.value.applies_to.id) {
      ids.add(entry.value.applies_to.id);
    }
  } else if (entry.key === 'LineageEdge') {
    ids.add(entry.value.source.id);
    ids.add(entry.value.target.id);
  }
  return ids;
}

function recordMatchesFocus(recordProjection, focus) {
  if (!focus || focus.kind === 'all') {
    return true;
  }
  const entry = kindEntry(recordProjection);
  if (focus.kind === 'model_call') {
    if (entry.key === 'ModelExchangeArtifact') {
      return entry.value.exchange_id === focus.id;
    }
    if (entry.key === 'LineageEdge') {
      return entry.value.source.id === 'model-call:' + focus.id || entry.value.target.id === 'model-call:' + focus.id;
    }
    if (entry.key === 'SignalSnapshot' && entry.value.applies_to) {
      return entry.value.applies_to.id === 'model-call:' + focus.id;
    }
    return false;
  }
  if (focus.kind === 'planner_step') {
    if (entry.key === 'PlannerAction') {
      return 'planner-step:' + recordProjection.record.record_id === focus.id;
    }
    if (entry.key === 'LineageEdge') {
      return entry.value.source.id === focus.id || entry.value.target.id === focus.id;
    }
    if (entry.key === 'SignalSnapshot' && entry.value.applies_to) {
      return entry.value.applies_to.id === focus.id;
    }
    return false;
  }
  return true;
}

function recordsForTurn(turn) {
  if (!turn) return [];
  return turn.records.filter((recordProjection) => recordMatchesFocus(recordProjection, selectedFocus));
}

function selectConversation() {
  selectedSelectionMode = 'conversation';
  selectedRecordId = null;
  forensicTailMode = true;
  renderForensics();
}

function selectTurn(turnId) {
  selectedTurnId = turnId;
  selectedSelectionMode = 'turn';
  selectedRecordId = null;
  selectedFocus = { kind: 'all', id: null };
  forensicTailMode = true;
  normalizeSelection();
  renderForensics();
}

function selectFocus(kind, id) {
  selectedFocus = { kind, id };
  selectedSelectionMode = 'turn';
  selectedRecordId = null;
  forensicTailMode = true;
  normalizeSelection();
  renderForensics();
}

function selectRecord(recordId) {
  selectedSelectionMode = 'record';
  selectedRecordId = recordId;
  const turn = currentTurn();
  const records = recordsForTurn(turn);
  forensicTailMode = !!records.length && records[records.length - 1].record.record_id === recordId;
  renderForensics();
}

function normalizeSelection() {
  const turns = projectionTurns();
  if (!turns.length) {
    selectedTurnId = null;
    selectedRecordId = null;
    selectedSelectionMode = 'conversation';
    selectedFocus = { kind: 'all', id: null };
    return;
  }
  if (!turns.some((turn) => turn.turn_id === selectedTurnId)) {
    selectedTurnId = turns[turns.length - 1].turn_id;
  }
  const turn = currentTurn();
  if (!focusMatchesTurn(turn, selectedFocus)) {
    selectedFocus = { kind: 'all', id: null };
  }
  const records = recordsForTurn(turn);
  if (selectedSelectionMode === 'record') {
    if (!records.some((recordProjection) => recordProjection.record.record_id === selectedRecordId)) {
      if (records.length) {
        selectedRecordId = records[records.length - 1].record.record_id;
      } else {
        selectedSelectionMode = 'turn';
        selectedRecordId = null;
      }
    }
  }
  if (!selectedSelectionMode) {
    selectedSelectionMode = records.length ? 'record' : 'turn';
    selectedRecordId = records.length ? records[records.length - 1].record.record_id : null;
  }
}

function currentRecord() {
  if (selectedSelectionMode !== 'record') {
    return null;
  }
  return recordsForTurn(currentTurn()).find((recordProjection) => recordProjection.record.record_id === selectedRecordId) || null;
}

function recordSummary(recordProjection) {
  const entry = kindEntry(recordProjection);
  if (entry.key === 'ModelExchangeArtifact') {
    const artifact = entry.value.artifact || {};
    return artifact.summary || (entry.value.category + ' ' + entry.value.phase);
  }
  if (entry.key === 'PlannerAction') {
    return entry.value.action || 'planner action';
  }
  if (entry.key === 'LineageEdge') {
    return entry.value.summary || 'lineage edge';
  }
  if (entry.key === 'SignalSnapshot') {
    return entry.value.summary || 'influence snapshot';
  }
  if (entry.key === 'CompletionCheckpoint') {
    return entry.value.summary || 'completion';
  }
  if (entry.key === 'SelectionArtifact') {
    return entry.value.summary || 'selection';
  }
  if (entry.key === 'ToolCallRequested' || entry.key === 'ToolCallCompleted') {
    return entry.value.tool_name || 'tool';
  }
  if (entry.key === 'TurnStarted' && entry.value.prompt) {
    return entry.value.prompt.summary || 'turn started';
  }
  if (entry.key === 'TaskRootStarted' && entry.value.prompt) {
    return entry.value.prompt.summary || 'task root';
  }
  return kindLabel(entry.key);
}

function recordMeta(recordProjection) {
  const entry = kindEntry(recordProjection);
  const base = [
    'step ' + recordProjection.record.sequence,
    kindLabel(entry.key),
    lifecycleLabel(recordProjection.lifecycle)
  ];
  if (entry.key === 'ModelExchangeArtifact') {
    base.push(entry.value.lane);
    base.push(entry.value.phase);
    base.push(entry.value.provider + ':' + entry.value.model);
  }
  if (entry.key === 'SignalSnapshot') {
    base.push(entry.value.level);
    base.push((entry.value.magnitude_percent || 0) + '%');
  }
  return base.filter(Boolean).join(' · ');
}

function primaryArtifact(recordProjection) {
  const entry = kindEntry(recordProjection);
  if (entry.key === 'ModelExchangeArtifact') {
    return entry.value.artifact || null;
  }
  if (entry.key === 'CompletionCheckpoint') {
    return entry.value.response || null;
  }
  if (entry.key === 'SelectionArtifact') {
    return entry.value.artifact || null;
  }
  if (entry.key === 'ToolCallRequested' || entry.key === 'ToolCallCompleted') {
    return entry.value.payload || null;
  }
  if (entry.key === 'SignalSnapshot') {
    return entry.value.artifact || null;
  }
  if (entry.key === 'TurnStarted' || entry.key === 'TaskRootStarted') {
    return entry.value.prompt || null;
  }
  return null;
}

function artifactText(artifact) {
  if (!artifact) return '';
  return artifact.inline_content || '';
}

function maybePrettyJson(text) {
  if (!text) return '';
  try {
    return JSON.stringify(JSON.parse(text), null, 2);
  } catch (err) {
    return text;
  }
}

function renderedRecordBody(recordProjection) {
  const entry = kindEntry(recordProjection);
  const artifact = primaryArtifact(recordProjection);
  if (artifact) {
    const text = artifactText(artifact);
    if (!text) {
      if (artifact.locator) {
        return 'Payload stored in ' + artifact.locator.tier + ' context at ' + JSON.stringify(artifact.locator, null, 2);
      }
      return 'No inline payload was recorded for this artifact.';
    }
    return artifact.mime_type && artifact.mime_type.indexOf('json') !== -1 ? maybePrettyJson(text) : text;
  }
  if (entry.key === 'LineageEdge') {
    return [
      entry.value.summary || 'lineage edge',
      '',
      entry.value.source.label + ' -> ' + entry.value.target.label,
      'relation: ' + entry.value.relation
    ].join('\n');
  }
  if (entry.key === 'PlannerAction') {
    return 'action: ' + (entry.value.action || '') + '\n\nrationale: ' + (entry.value.rationale || '');
  }
  if (entry.key === 'SignalSnapshot') {
    const contributions = (entry.value.contributions || [])
      .map((contribution) => '- ' + contribution.source + ': ' + contribution.share_percent + '% (' + contribution.rationale + ')')
      .join('\n');
    return [
      entry.value.summary || 'influence snapshot',
      '',
      'level: ' + entry.value.level,
      'magnitude: ' + entry.value.magnitude_percent + '%',
      '',
      contributions
    ].join('\n');
  }
  return maybePrettyJson(JSON.stringify(entry.value, null, 2));
}

function rawRecordBody(recordProjection) {
  const artifact = primaryArtifact(recordProjection);
  if (artifact && artifact.inline_content) {
    return artifact.inline_content;
  }
  return JSON.stringify(recordProjection.record, null, 2);
}

function relatedLineageSummaries(turn, recordProjection) {
  if (!turn || !recordProjection) return [];
  const relevantIds = nodeIdsForRecord(recordProjection);
  if (!relevantIds.size) return [];
  return turn.records
    .filter((candidate) => kindEntry(candidate).key === 'LineageEdge')
    .filter((candidate) => {
      const edge = kindEntry(candidate).value;
      return relevantIds.has(edge.source.id) || relevantIds.has(edge.target.id);
    })
    .map((candidate) => {
      const edge = kindEntry(candidate).value;
      return edge.source.label + ' -> ' + edge.target.label + ' · ' + edge.relation;
    });
}

function renderForensicOverview() {
  const topology = document.getElementById('forensic-topology-overview');
  const signalCard = document.getElementById('forensic-signal-overview');
  const shadow = document.getElementById('forensic-shadow-overview');
  const turns = projectionTurns();
  const turn = currentTurn();
  const recordProjection = turn ? selectedComparisonRecord(turn) : null;
  if (!turns.length) {
    [topology, signalCard, shadow].forEach((card) => {
      card.dataset.card = 'empty';
      card.innerHTML = '<div class="forensic-empty">Forensic replay appears here when transit records exist.</div>';
    });
    return;
  }

  [topology, signalCard, shadow].forEach((card) => delete card.dataset.card);

  const scopeTurns = selectionScopeTurns();
  const topologyRecords = (selectedSelectionMode === 'conversation'
    ? scopeTurns.reduce((allRecords, turnItem) => allRecords.concat(turnItem.records), [])
    : recordsForTurn(turn).length
      ? recordsForTurn(turn)
      : turn.records);
  const totalScopeRecords = topologyRecords.length;
  const signalSnapshots = signalSnapshotsForSelection();
  const strongestSignal = strongestSignalSnapshot(signalSnapshots);
  const strongestSignalValue = strongestSignal ? kindEntry(strongestSignal).value : null;
  const aggregatedContribs = aggregateSignalContributions(signalSnapshots);
  const selectedRecordIdForTopology = recordProjection ? recordProjection.record.record_id : null;
  const topologyPoints = topologyRecords.map((recordItem, index) => {
    const entry = kindEntry(recordItem);
    const x = 16 + index * ((312 - 32) / Math.max(topologyRecords.length - 1, 1));
    const yBand = entry.key === 'SignalSnapshot' ? 0 : entry.key === 'LineageEdge' ? 1 : 2;
    const y = 20 + yBand * 22 + ((index % 2) * 6);
    const recordKind = entry.key === 'SignalSnapshot'
      ? entry.value.kind
      : entry.key.toLowerCase();
    const color = FORCE_KIND_COLORS[recordKind] || KIND_COLORS[recordKind] || '#2d90c8';
    return {
      x,
      y,
      color,
      selected: recordItem.record.record_id === selectedRecordIdForTopology,
      radius: recordItem.record.record_id === selectedRecordIdForTopology ? 7 : entry.key === 'SignalSnapshot' ? 6 : 4.5
    };
  });
  const topologyPath = topologyPoints.length
    ? 'M ' + topologyPoints.map((point) => point.x + ' ' + point.y).join(' L ')
    : '';
  const topologyLegend = [
    {
      label: 'Scope',
      value: selectedSelectionMode === 'conversation' ? 'conversation' : (selectedFocus.kind === 'all' ? 'turn' : selectedFocus.kind.replace('_', ' '))
    },
    {
      label: 'Signal nodes',
      value: signalSnapshots.length
    },
    {
      label: 'Selection',
      value: recordProjection ? truncate(recordSummary(recordProjection), 20) : 'turn'
    }
  ];

  topology.innerHTML =
    '<div class="forensic-card-title">Topology</div>' +
    '<svg class="forensic-topology" viewBox="0 0 320 92" preserveAspectRatio="none">' +
      (topologyPath ? '<path d="' + escapeHtml(topologyPath) + '" stroke="rgba(56, 87, 112, 0.54)" stroke-width="4"></path>' : '') +
      topologyPoints.map((point) => (
        (point.selected ? '<circle cx="' + point.x + '" cy="' + point.y + '" r="' + (point.radius + 4) + '" fill="rgba(240, 138, 36, 0.16)"></circle>' : '') +
        '<circle cx="' + point.x + '" cy="' + point.y + '" r="' + point.radius + '" fill="' + point.color + '" stroke="rgba(255,255,255,0.82)" stroke-width="1.5"></circle>'
      )).join('') +
      '<text x="12" y="82">turns ' + scopeTurns.length + ' · records ' + totalScopeRecords + ' · focus ' + escapeHtml(selectedFocus.kind === 'all' ? 'all' : selectedFocus.kind.replace('_', ' ')) + '</text>' +
    '</svg>' +
    '<dl class="forensic-topology-metrics">' +
      topologyLegend.map((metric) => (
        '<div class="forensic-topology-metric"><dt>' + escapeHtml(metric.label) + '</dt><dd>' + escapeHtml(metric.value) + '</dd></div>'
      )).join('') +
    '</dl>' +
    '<div class="forensic-topology-legend">' +
      '<span class="forensic-chip"><span class="forensic-chip-swatch" style="--chip-color:' + KIND_COLORS.forensic + '"></span>lineage path</span>' +
      '<span class="forensic-chip"><span class="forensic-chip-swatch" style="--chip-color:' + KIND_COLORS.action + '"></span>model/tool state</span>' +
      '<span class="forensic-chip"><span class="forensic-chip-swatch" style="--chip-color:' + KIND_COLORS.signal + '"></span>steering signals</span>' +
    '</div>';

  if (!signalSnapshots.length) {
    signalCard.innerHTML =
      '<div class="forensic-card-title">Steering Signals</div>' +
      '<div class="forensic-empty">No steering signals were recorded for the current lineage selection.</div>';
  } else {
    const gaugeColor = FORCE_LEVEL_COLORS[strongestSignalValue.level] || FORCE_KIND_COLORS[strongestSignalValue.kind] || KIND_COLORS.signal;
    const signalRows = signalSnapshots.slice(0, 4).map((signalProjection) => {
      const value = kindEntry(signalProjection).value;
      const rowColor = FORCE_KIND_COLORS[value.kind] || FORCE_LEVEL_COLORS[value.level] || KIND_COLORS.signal;
      const chips = (value.contributions || []).slice(0, 3).map((contribution) => (
        '<span class="forensic-chip" title="' + escapeHtml(contribution.rationale || '') + '">' +
          '<span class="forensic-chip-swatch" style="--chip-color:' + sourceColor(contribution.source) + '"></span>' +
          escapeHtml(sourceLabel(contribution.source)) + ' ' + (contribution.share_percent || 0) + '%' +
        '</span>'
      )).join('');
      return (
        '<div class="forensic-signal-row">' +
          '<div class="forensic-signal-label">' + escapeHtml(value.summary || signalKindLabel(value.kind)) + '</div>' +
          '<div class="forensic-signal-meta">' + escapeHtml(signalKindLabel(value.kind)) + ' · ' + escapeHtml(value.level) + '</div>' +
          '<div class="forensic-signal-bar"><span style="width:' + (value.magnitude_percent || 0) + '%;background:linear-gradient(90deg,' + rowColor + ', rgba(255,255,255,0.92));"></span></div>' +
          '<div class="forensic-signal-meta">' + (value.applies_to ? escapeHtml(value.applies_to.label) : 'turn scope') + '</div>' +
          '<div class="forensic-contribs">' + chips + '</div>' +
        '</div>'
      );
    }).join('');

    signalCard.innerHTML =
      '<div class="forensic-card-title">Steering Signals</div>' +
      '<div class="forensic-signal-hero">' +
        '<div class="forensic-signal-gauge" style="--signal-sweep:' + (strongestSignalValue.magnitude_percent || 0) + '%;--signal-color:' + gaugeColor + '">' +
          '<div class="forensic-signal-gauge-content">' +
            '<div class="forensic-signal-gauge-value">' + (strongestSignalValue.magnitude_percent || 0) + '%</div>' +
            '<div class="forensic-signal-gauge-label">' + escapeHtml(strongestSignalValue.level) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="forensic-signal-summary">' +
          '<div class="forensic-signal-summary-row"><strong>' + escapeHtml(signalKindLabel(strongestSignalValue.kind)) + '</strong><span>' + signalSnapshots.length + ' snapshot' + (signalSnapshots.length === 1 ? '' : 's') + '</span></div>' +
          '<div class="forensic-signal-summary-row"><span>Selection</span><span>' + escapeHtml(recordProjection ? recordSummary(recordProjection) : turn.turn_id) + '</span></div>' +
          '<div class="forensic-signal-summary-row"><span>Scope</span><span>' + escapeHtml(selectedFocus.kind === 'all' ? 'all records' : selectedFocus.kind.replace('_', ' ')) + '</span></div>' +
          '<div class="forensic-contribs forensic-contribs--stacked">' +
            aggregatedContribs.slice(0, 5).map((contribution) => (
              '<span class="forensic-chip" title="' + escapeHtml(contribution.rationale) + '">' +
                '<span class="forensic-chip-swatch" style="--chip-color:' + contribution.color + '"></span>' +
                escapeHtml(contribution.label) + ' ' + contribution.percent + '%' +
              '</span>'
            )).join('') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="forensic-signal-list">' + signalRows + '</div>';
  }

  if (!recordProjection) {
    shadow.innerHTML =
      '<div class="forensic-card-title">Shadow Baseline</div>' +
      '<div class="forensic-empty">Select or focus a lineage artifact to compare it with its previous artifact baseline.</div>';
    return;
  }

  const baseline = previousArtifactBaseline(turn, recordProjection);
  if (!baseline) {
    shadow.innerHTML =
      '<div class="forensic-card-title">Shadow Baseline</div>' +
      '<div class="forensic-empty">No previous artifact in lineage was available for this selection yet.</div>';
    return;
  }

  const currentBody = selectedDetailMode === 'raw' ? rawRecordBody(recordProjection) : renderedRecordBody(recordProjection);
  const baselineBody = selectedDetailMode === 'raw' ? rawRecordBody(baseline) : renderedRecordBody(baseline);
  const currentArtifact = primaryArtifact(recordProjection);
  const baselineArtifact = primaryArtifact(baseline);
  const charDelta = (currentBody || '').length - (baselineBody || '').length;
  const sequenceDelta = recordProjection.record.sequence - baseline.record.sequence;
  const deltaClass = charDelta > 0 ? 'is-positive' : charDelta < 0 ? 'is-negative' : '';

  shadow.innerHTML =
    '<div class="forensic-card-title">Shadow Baseline</div>' +
    '<div class="forensic-shadow-compare">' +
      '<div class="forensic-shadow-pane">' +
        '<div class="forensic-shadow-pane-label">Current</div>' +
        '<div class="forensic-shadow-pane-title">' + escapeHtml(recordSummary(recordProjection)) + '</div>' +
        '<div class="forensic-shadow-pane-meta">' + escapeHtml(recordMeta(recordProjection)) + '</div>' +
        '<div class="forensic-shadow-pane-snippet">' + escapeHtml(comparisonSnippet(recordProjection)) + '</div>' +
      '</div>' +
      '<div class="forensic-shadow-pane is-baseline">' +
        '<div class="forensic-shadow-pane-label">Baseline</div>' +
        '<div class="forensic-shadow-pane-title">' + escapeHtml(recordSummary(baseline)) + '</div>' +
        '<div class="forensic-shadow-pane-meta">' + escapeHtml(recordMeta(baseline)) + '</div>' +
        '<div class="forensic-shadow-pane-snippet">' + escapeHtml(comparisonSnippet(baseline)) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="forensic-shadow-list">' +
      '<div class="forensic-shadow-row"><div class="forensic-shadow-label">Delta chars</div><div class="forensic-shadow-meta"><span class="forensic-shadow-delta ' + deltaClass + '">' + escapeHtml(formatDelta(charDelta)) + '</span></div></div>' +
      '<div class="forensic-shadow-row"><div class="forensic-shadow-label">Lineage gap</div><div class="forensic-shadow-meta">' + sequenceDelta + ' step' + (sequenceDelta === 1 ? '' : 's') + '</div></div>' +
      '<div class="forensic-shadow-row"><div class="forensic-shadow-label">Mime</div><div class="forensic-shadow-meta">' + escapeHtml((currentArtifact && currentArtifact.mime_type) || 'record/json') + ' ← ' + escapeHtml((baselineArtifact && baselineArtifact.mime_type) || 'record/json') + '</div></div>' +
      '<div class="forensic-shadow-row"><div class="forensic-shadow-label">Mode</div><div class="forensic-shadow-meta">' + escapeHtml(selectedDetailMode) + ' payload baseline</div></div>' +
    '</div>';
}

    '</div>';

  const conversationButton = document.getElementById('forensic-conversation-button');

    conversationButton.addEventListener('click', selectConversation);
  }
  nav.querySelectorAll('[data-turn-id]').forEach((button) => {
    button.addEventListener('click', () => selectTurn(button.dataset.turnId));
  });

      }
    });
  });
}
